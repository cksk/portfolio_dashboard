        // ZEROED OUT BASELINE: Ensures your public GitHub source code is completely private.
        const INITIAL_HOLDINGS = [
            { id: '1', symbol: 'VTI', name: 'Vanguard Total Stock Market ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 278.60, color: '#3b82f6', targetWeight: 45, estYield: 1.38, lastDividendDate: '2026-03-24', dividendPerShare: 0.95, currency: 'USD', expenseRatio: 0.03 },
            { id: '2', symbol: 'SCHG', name: 'Schwab U.S. Large-Cap Growth ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 112.45, color: '#60a5fa', targetWeight: 25, estYield: 0.43, lastDividendDate: '2026-03-20', dividendPerShare: 0.12, currency: 'USD', expenseRatio: 0.04 },

            { id: '6', symbol: '3010.HK', name: 'Amundi MSCI China UCITS ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 4.45, color: '#eab308', targetWeight: 2.5, estYield: 1.10, lastDividendDate: '2026-05-10', dividendPerShare: 0.05, currency: 'HKD', expenseRatio: 0.30 }
        ];

        const INITIAL_TRANSACTIONS = [];

        function App() {
            // =========================================================================
            // ⚠️ PASTE YOUR SECURE FIREBASE CONFIG DETAILS HERE ⚠️
            // =========================================================================
            const firebaseConfig = {
                apiKey: "AIzaSyDkfirHWR_KP7tIj3mP0BA7299qaPvK5gk",
                authDomain: "dashboard-b9f1a.firebaseapp.com",
                projectId: "dashboard-b9f1a",
                storageBucket: "dashboard-b9f1a.firebasestorage.app",
                messagingSenderId: "94608767491",
                appId: "1:94608767491:web:25f56a9ef8e0514bda6c36"
            };

            const [holdings, setHoldings] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [claimedDividendsCash, setClaimedDividendsCash] = useState(0); 
            const [unclaimedDividends, setUnclaimedDividends] = useState([]);
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [timeframe, setTimeframe] = useState('1M'); 
            const [selectedAssetForModal, setSelectedAssetForModal] = useState(null);
            
            const [usdToHkd, setUsdToHkd] = useState(7.80);

            const [showSpy, setShowSpy] = useState(true);

            // Modal & Alert states
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isBuySellModalOpen, setIsBuySellModalOpen] = useState(false);
            const [isClaimDivModalOpen, setIsClaimDivModalOpen] = useState(false);
            const [selectedDivToClaim, setSelectedDivToClaim] = useState(null);
            const [modalAlert, setModalAlert] = useState(null);

            const [isEditTxModalOpen, setIsEditTxModalOpen] = useState(false);
            const [selectedTxForEdit, setSelectedTxForEdit] = useState(null);
            const [editTxType, setEditTxType] = useState('BUY');
            const [editTxSymbol, setEditTxSymbol] = useState('');
            const [editTxAmount, setEditTxAmount] = useState('');
            const [editTxPrice, setEditTxPrice] = useState('');
            const [editTxDate, setEditTxDate] = useState('');
            const [editTxCurrency, setEditTxCurrency] = useState('USD');
            const [editTxCommission, setEditTxCommission] = useState('0');

            // Manual Transaction Form
            const [txFormType, setTxFormType] = useState('BUY');
            const [txFormSymbol, setTxFormSymbol] = useState('VTI');
            const [txFormShares, setTxFormShares] = useState('');
            const [txFormPrice, setTxFormPrice] = useState('');
            const [txFormDate, setTxFormDate] = useState(() => new Date().toISOString().split('T')[0]);
            const [txFormCurrency, setTxFormCurrency] = useState('USD');
            const [txFormCommission, setTxFormCommission] = useState('0');

            const [newSymbol, setNewSymbol] = useState('');
            const [newName, setNewName] = useState('');
            const [newCategory, setNewCategory] = useState('Stocks');
            const [newShares, setNewShares] = useState('');
            const [newPrice, setNewPrice] = useState('');
            const [newCurrency, setNewCurrency] = useState('USD');
            const [newExpenseRatio, setNewExpenseRatio] = useState('0.10');

            const [tradeType, setTradeType] = useState('BUY');
            const [tradeAmount, setTradeAmount] = useState('');
            const [tradePrice, setTradePrice] = useState('');

            const [divCommissionType, setDivCommissionType] = useState('FLAT'); 
            const [divCommissionVal, setDivCommissionVal] = useState('1.99');

            const [projectorYears, setProjectorYears] = useState(10);
            const [projectorCagr, setProjectorCagr] = useState(7.5); 
            const [isDripEnabled, setIsDripEnabled] = useState(true);

            const [activeStressTest, setActiveStressTest] = useState(null);
            const [copilotInput, setCopilotInput] = useState('');
            const [messages, setMessages] = useState([{ sender: 'assistant', text: "Welcome! Your dashboard is active with Google Sign-In protection. Sync your live rates to see the latest valuation!" }]);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(true);

            const [user, setUser] = useState(null);
            const [cloudStatus, setCloudStatus] = useState('connecting');

            // --- AUTO FORM CURRENCY SYNC ---
            useEffect(() => {
                const selectedAsset = holdings.find(h => h.symbol === txFormSymbol);
                if (selectedAsset) {
                    setTxFormCurrency(selectedAsset.currency || 'USD');
                }
            }, [txFormSymbol, holdings]);

            // --- FIREBASE CONNECTION & AUTHENTICATION ---
            useEffect(() => {
                const tools = getFirebaseTools();
                if (!tools.initializeApp || firebaseConfig.apiKey === "PASTE_YOUR_API_KEY_HERE") {
                    setCloudStatus('unauthenticated');
                    return;
                }

                try {
                    const app = tools.initializeApp(firebaseConfig);
                    const auth = tools.getAuth(app);
                    const db = tools.getFirestore(app);

                    const unsubscribe = tools.onAuthStateChanged(auth, (currentUser) => {
                        setUser(currentUser);
                        if (currentUser) {
                            setCloudStatus('connecting');
                            const docRef = tools.doc(db, 'artifacts', 'portfolio-dashboard-main', 'users', currentUser.uid, 'portfolioState', 'data');
                            tools.onSnapshot(docRef, (docSnap) => {
                                if (docSnap.exists()) {
                                    const cloudData = docSnap.data();
                                    setHoldings(cloudData.holdings || INITIAL_HOLDINGS);
                                    setTransactions(cloudData.transactions || []);
                                    setClaimedDividendsCash(cloudData.claimedDividendsCash || 0);
                                    setUnclaimedDividends(cloudData.unclaimedDividends || []);
                                    setCloudStatus('synced');
                                } else {
                                    tools.setDoc(docRef, {
                                        holdings: INITIAL_HOLDINGS,
                                        transactions: INITIAL_TRANSACTIONS,
                                        claimedDividendsCash: 0,
                                        unclaimedDividends: []
                                    }).then(() => setCloudStatus('synced'));
                                }
                            }, (err) => {
                                console.error("Firestore DB access error:", err);
                                setCloudStatus('error');
                            });
                        } else {
                            setCloudStatus('unauthenticated');
                        }
                    });
                    return () => unsubscribe();
                } catch (err) {
                    console.error("Firebase Init failed: ", err);
                    setCloudStatus('unauthenticated');
                }
            }, []);

            const handleGoogleSignIn = async () => {
                const tools = getFirebaseTools();
                const app = tools.initializeApp(firebaseConfig);
                const auth = tools.getAuth(app);
                const provider = new tools.GoogleAuthProvider();

                setCloudStatus('connecting');
                try {
                    await tools.signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Google Sign-In failed: ", error);
                    setCloudStatus('unauthenticated');
                }
            };

            const handleSignOut = async () => {
                const tools = getFirebaseTools();
                const app = tools.initializeApp(firebaseConfig);
                const auth = tools.getAuth(app);
                try {
                    await tools.signOut(auth);
                    setHoldings([]);
                    setTransactions([]);
                    setClaimedDividendsCash(0);
                    setCloudStatus('unauthenticated');
                } catch (err) {
                    console.error("Sign out failed: ", err);
                }
            };

            const saveToCloud = async (newHoldings, newTransactions, newDividendsCash, newUnclaimed) => {
                const tools = getFirebaseTools();
                if (!tools.initializeApp || !user) return;
                setCloudStatus('saving');

                try {
                    const app = tools.initializeApp(firebaseConfig);
                    const db = tools.getFirestore(app);
                    const docRef = tools.doc(db, 'artifacts', 'portfolio-dashboard-main', 'users', user.uid, 'portfolioState', 'data');
                    
                    await tools.setDoc(docRef, {
                        holdings: newHoldings,
                        transactions: newTransactions,
                        claimedDividendsCash: newDividendsCash,
                        unclaimedDividends: newUnclaimed
                    });
                    setCloudStatus('synced');
                } catch (err) {
                    console.error("Cloud save failed: ", err);
                    setCloudStatus('error');
                }
            };

            const showNotification = (title, message) => {
                setModalAlert({ title, message, isConfirm: false, onConfirm: null });
            };

            const showConfirmation = (title, message, onConfirm) => {
                setModalAlert({ title, message, isConfirm: true, onConfirm });
            };

            const truncateId = (id) => {
                if (!id) return '';
                if (id.length <= 12) return id;
                return `${id.substring(0, 6)}...${id.substring(id.length - 4)}`;
            };

            const syncLiveMarketPrices = async () => {
                setLastPriceSync("Syncing...");
                let updatedHoldings = [...holdings];

                try {
                    const fxUrl = `https://query1.finance.yahoo.com/v8/finance/chart/HKD=X?interval=1d&range=1d`;
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(fxUrl)}`;
                    const response = await fetch(proxyUrl);
                    if (response.ok) {
                        const resJson = await response.json();
                        const rate = JSON.parse(resJson.contents)?.chart?.result?.[0]?.meta?.regularMarketPrice;
                        if (rate) setUsdToHkd(parseFloat(rate.toFixed(4)));
                    }
                } catch (err) { console.warn("Forex fetch failed."); }

                for (let i = 0; i < updatedHoldings.length; i++) {
                    const h = updatedHoldings[i];
                    try {
                        const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${h.symbol}?interval=1d&range=2d`;
                        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                        const response = await fetch(proxyUrl);
                        if (response.ok) {
                            const resJson = await response.json();
                            const price = JSON.parse(resJson.contents)?.chart?.result?.[0]?.meta?.regularMarketPrice;
                            if (price) {
                                updatedHoldings[i] = { ...h, currentPrice: parseFloat(price.toFixed(2)) };
                            }
                        }
                    } catch (err) { console.warn(`Price fetch failed for ${h.symbol}`); }
                }

                setHoldings(updatedHoldings);
                setLastPriceSync(new Date().toLocaleTimeString());
                saveToCloud(updatedHoldings, transactions, claimedDividendsCash, unclaimedDividends);
                showNotification("Sync Success", "Market prices and dynamic FX conversions synced cleanly!");
            };

            const totals = useMemo(() => {
                let totalValueUSD = 0, totalCostUSD = 0, categoryMap = {}, weightedExpenseRatio = 0, portfolioBeta = 0;

                holdings.forEach(h => {
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? h.currentPrice / usdToHkd : h.currentPrice;
                    const avgBuyPriceUSD = isHKD ? h.avgBuyPrice / usdToHkd : h.avgBuyPrice;
                    const valueUSD = h.shares * currentPriceUSD;
                    const costUSD = h.shares * avgBuyPriceUSD;

                    totalValueUSD += valueUSD;
                    totalCostUSD += costUSD;

                    if (!categoryMap[h.category]) categoryMap[h.category] = { name: h.category, value: 0, color: h.color };
                    categoryMap[h.category].value += valueUSD;
                });

                holdings.forEach(h => {
                    const isHKD = h.currency === 'HKD';
                    const valUSD = h.shares * (isHKD ? h.currentPrice / usdToHkd : h.currentPrice);
                    const weight = totalValueUSD > 0 ? (valUSD / totalValueUSD) : 0;
                    weightedExpenseRatio += weight * h.expenseRatio;
                    portfolioBeta += weight * (ASSET_METADATA[h.symbol]?.beta || 1.0);
                });

                return {
                    totalValueUSD, totalValueHKD: totalValueUSD * usdToHkd, totalCostUSD, totalCostHKD: totalCostUSD * usdToHkd,
                    totalGainUSD: totalValueUSD - totalCostUSD, gainPercentage: totalCostUSD > 0 ? ((totalValueUSD - totalCostUSD) / totalCostUSD) * 100 : 0,
                    categories: Object.values(categoryMap).map(c => ({ ...c, percentage: totalValueUSD > 0 ? (c.value / totalValueUSD) * 100 : 0 })),
                    weightedExpenseRatio, annualDragUSD: totalValueUSD * (weightedExpenseRatio / 100), portfolioBeta
                };
            }, [holdings, usdToHkd]);

            const geographicExposure = useMemo(() => {
                let totalsMap = { US: 0, Europe: 0, AsiaPacific: 0, ChinaHK: 0 };
                holdings.forEach(h => {
                    const valUSD = h.shares * (h.currency === 'HKD' ? h.currentPrice / usdToHkd : h.currentPrice);
                    if (ASSET_METADATA[h.symbol]?.geographic) {
                        Object.keys(ASSET_METADATA[h.symbol].geographic).forEach(geo => totalsMap[geo] += (ASSET_METADATA[h.symbol].geographic[geo] / 100) * valUSD);
                    } else totalsMap.US += valUSD; 
                });
                return Object.keys(totalsMap).map(geo => ({ name: geo === 'ChinaHK' ? 'China / Hong Kong' : geo, valueUSD: totalsMap[geo], percentage: totals.totalValueUSD > 0 ? (totalsMap[geo] / totals.totalValueUSD) * 100 : 0 })).sort((a,b) => b.valueUSD - a.valueUSD);
            }, [holdings, totals.totalValueUSD, usdToHkd]);

            const sectorExposure = useMemo(() => {
                let totalsMap = { Technology: 0, Consumer: 0, Financials: 0, Healthcare: 0, Communications: 0, Industrials: 0, Other: 0 };
                holdings.forEach(h => {
                    const valUSD = h.shares * (h.currency === 'HKD' ? h.currentPrice / usdToHkd : h.currentPrice);
                    if (ASSET_METADATA[h.symbol]?.sectors) {
                        Object.keys(ASSET_METADATA[h.symbol].sectors).forEach(sec => totalsMap[sec] += (ASSET_METADATA[h.symbol].sectors[sec] / 100) * valUSD);
                    } else totalsMap.Other += valUSD; 
                });
                return Object.keys(totalsMap).map(sec => ({ name: sec, valueUSD: totalsMap[sec], percentage: totals.totalValueUSD > 0 ? (totalsMap[sec] / totals.totalValueUSD) * 100 : 0 })).sort((a,b) => b.valueUSD - a.valueUSD);
            }, [holdings, totals.totalValueUSD, usdToHkd]);

            const overlaps = useMemo(() => {
                let stocksMap = {};
                holdings.forEach(h => {
                    const valUSD = h.shares * (h.currency === 'HKD' ? h.currentPrice / usdToHkd : h.currentPrice);
                    if (ASSET_METADATA[h.symbol]?.holdings) {
                        Object.keys(ASSET_METADATA[h.symbol].holdings).forEach(ticker => {
                            if (!stocksMap[ticker]) stocksMap[ticker] = { symbol: ticker, sources: [], totalValueUSD: 0 };
                            const impliedValUSD = (ASSET_METADATA[h.symbol].holdings[ticker] / 100) * valUSD;
                            stocksMap[ticker].totalValueUSD += impliedValUSD;
                            stocksMap[ticker].sources.push({ etf: h.symbol, weight: ASSET_METADATA[h.symbol].holdings[ticker] });
                        });
                    }
                });
                return Object.values(stocksMap).map(stock => ({ ...stock, percentage: totals.totalValueUSD > 0 ? (stock.totalValueUSD / totals.totalValueUSD) * 100 : 0 })).sort((a, b) => b.totalValueUSD - a.totalValueUSD);
            }, [holdings, totals.totalValueUSD, usdToHkd]);

            const getTxNet = (tx) => {
                const gross = tx.amount * tx.price;
                const comm = parseFloat(tx.commission) || 0;
                if (tx.type === 'BUY') return gross + comm;
                if (tx.type === 'SELL') return gross - comm;
                if (tx.type === 'DIVIDEND') return tx.amount - comm; 
                return gross;
            };

            const handleTargetWeightChange = (id, newWeight) => {
                const val = Math.max(0, Math.min(100, parseFloat(newWeight) || 0));
                const nextHoldings = holdings.map(h => h.id === id ? { ...h, targetWeight: val } : h);
                setHoldings(nextHoldings);
                saveToCloud(nextHoldings, transactions, claimedDividendsCash, unclaimedDividends);
            };

            const totalTargetWeight = useMemo(() => {
                return holdings.reduce((acc, h) => acc + (parseFloat(h.targetWeight) || 0), 0);
            }, [holdings]);

            const triggerPromptClaimDividend = (div) => {
                setSelectedDivToClaim(div);
                setDivCommissionType('PERCENT'); 
                setDivCommissionVal('30');
                setIsClaimDivModalOpen(true);
            };

            const executeClaimDividend = (e) => {
                e.preventDefault();
                if (!selectedDivToClaim) return;
                const div = selectedDivToClaim;
                const feeInput = parseFloat(divCommissionVal) || 0;
                let calculatedFee = divCommissionType === 'FLAT' ? feeInput : div.amount * (feeInput / 100);
                calculatedFee = Math.min(div.amount, calculatedFee);

                const isHKD = div.currency === 'HKD';
                const grossAmountUSD = isHKD ? div.amount / usdToHkd : div.amount;
                const feeAmountUSD = isHKD ? calculatedFee / usdToHkd : calculatedFee;
                const netAmountUSD = Math.max(0, grossAmountUSD - feeAmountUSD);
                
                let updatedHoldings = [...holdings];
                let nextCash = claimedDividendsCash;

                if (isDripEnabled) {
                    const targetIndex = holdings.findIndex(h => h.symbol === div.symbol);
                    if (targetIndex > -1) {
                        const targetAsset = holdings[targetIndex];
                        const netAmountInNativeCurrency = div.amount - calculatedFee;
                        const sharesToBuyFractional = netAmountInNativeCurrency / targetAsset.currentPrice;
                        const updatedShares = targetAsset.shares + sharesToBuyFractional;
                        const existingCostBasis = targetAsset.shares * targetAsset.avgBuyPrice;
                        const reinvestCostBasis = sharesToBuyFractional * targetAsset.currentPrice;
                        
                        updatedHoldings[targetIndex] = {
                            ...targetAsset,
                            shares: parseFloat(updatedShares.toFixed(4)),
                            avgBuyPrice: parseFloat(((existingCostBasis + reinvestCostBasis) / updatedShares).toFixed(2))
                        };
                    }
                    setHoldings(updatedHoldings);
                } else {

                    setClaimedDividendsCash(nextCash);
                }

                const nextUnclaimed = unclaimedDividends.map(d => d.id === div.id ? { ...d, processed: true } : d);

                const newTx = {
                    id: `div-tx-${Date.now()}`, type: 'DIVIDEND', symbol: div.symbol, category: 'Dividend Cash',
                    amount: div.amount, price: 1.00, commission: calculatedFee, currency: div.currency, date: new Date().toISOString().split('T')[0]
                };

                saveToCloud(updatedHoldings, nextTx, isDripModeActive ? claimedDividendsCash : nextCash, nextUnclaimed);

                setIsClaimDivModalOpen(false);

            const handleAddAsset = (e) => {
                e.preventDefault();
                if (!newSymbol || !newName || !newShares || !newPrice) return;
                const sharesNum = parseFloat(newShares), priceNum = parseFloat(newPrice);
                const colors = ['#ec4899', '#f43f5e', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6'];
                const existingIndex = holdings.findIndex(h => h.symbol.toUpperCase() === newSymbol.toUpperCase());

                    spyPoints.push({ label, value: spyCurrent + (Math.sin(progress * Math.PI * 1.8) * (seedValue * portfolioVol * 0.7 * 0.25)) + (progress * (seedValue * 0.035)) });
                    acwiPoints.push({ label, value: acwiCurrent + (Math.sin(progress * Math.PI * 1.5) * (seedValue * portfolioVol * 0.6 * 0.2)) + (progress * (seedValue * 0.025)) });
                }
                if (portfolioPoints.length > 0) portfolioPoints[portfolioPoints.length - 1].value = totals.totalValueUSD;
                if (spyPoints.length > 0) spyPoints[spyPoints.length - 1].value = totals.totalValueUSD * 0.94; 
                if (acwiPoints.length > 0) acwiPoints[acwiPoints.length - 1].value = totals.totalValueUSD * 0.91;

            }, [totals.totalValueUSD, totals.gainPercentage, timeframe]);

                return activeValList.length === 0 ? { min: 0, max: 1 } : { min: Math.min(...activeValList) * 0.99, max: Math.max(...activeValList) * 1.01 };

                                        <option value="SELL" className="bg-slate-900 text-slate-100">SELL</option>
                                        <option value="DIVIDEND" className="bg-slate-900 text-slate-100">DIVIDEND</option>
                                        <option value="LIQUIDATE" className="bg-slate-900 text-slate-100">LIQUIDATE</option>
                                      </select>
                                    </div>
                                    <div>
                                      <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Currency</label>
                                      <select value={editTxCurrency} onChange={e => setEditTxCurrency(e.target.value)} className="w-full px-3 py-2 rounded-xl text-sm border border-slate-700 bg-slate-900 text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-500" required>
                                        <option value="USD" className="bg-slate-900 text-slate-100">USD ($)</option>
                                        <option value="HKD" className="bg-slate-900 text-slate-100">HKD (HK$)</option>
                                      </select>
                                    </div>
                                  </div>
                                  <div className="grid grid-cols-3 gap-2">
                                    <div>
                                      <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Shares</label>
                                      <input type="number" step="any" value={editTxAmount} onChange={e => setEditTxAmount(e.target.value)} className="w-full px-3 py-2 rounded-xl text-sm border border-slate-700 bg-slate-900 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" required />
                                    </div>
                                    <div>
                                      <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Price</label>
                                      <input type="number" step="any" value={editTxPrice} onChange={e => setEditTxPrice(e.target.value)} className="w-full px-3 py-2 rounded-xl text-sm border border-slate-700 bg-slate-900 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" required />
                                    </div>
                                    <div>
                                      <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Commission</label>
                                      <input type="number" step="any" value={editTxCommission} onChange={e => setEditTxCommission(e.target.value)} className="w-full px-3 py-2 rounded-xl text-sm border border-slate-700 bg-slate-900 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" required />
                                    </div>
                                  </div>
                                  <div>
                                    <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Execution Date</label>
                                    <input type="date" value={editTxDate} onChange={e => setEditTxDate(e.target.value)} className="w-full px-3 py-2 rounded-xl text-sm border border-slate-700 bg-slate-900 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" required />
                                  </div>
                                  <div className="grid grid-cols-2 gap-2 pt-4">
                                    <button type="button" onClick={() => { setIsEditTxModalOpen(false); setSelectedTxForEdit(null); }} className="py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl text-xs transition-all">Cancel</button>
                                    <button type="submit" className="py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-xs transition-all">Save Changes</button>
                                  </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* DIVIDEND CLAIM MODAL */}
                    {isClaimDivModalOpen && selectedDivToClaim && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-slide-in">
                            <div className="w-full max-w-md p-6 rounded-2xl border border-slate-800 bg-slate-900 text-white shadow-2xl">
                                <h3 className="font-bold text-base mb-1">Reinvest Dividend</h3>
                                <form onSubmit={executeClaimDividend} className="space-y-4 mt-4">
                                    <div className="p-4 rounded-xl bg-slate-800/40 border border-slate-800 flex items-center justify-between text-xs">
                                        <div>
                                            <span className="font-bold opacity-60 block">Declared Holding</span>
                                            <span className="font-black text-sm text-indigo-400">{selectedDivToClaim.symbol}</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="font-bold opacity-60 block">Gross Distribution</span>
                                            <span className="font-black text-sm text-emerald-400">
                                                {selectedDivToClaim.currency === 'USD' ? '$' : 'HK$'}{selectedDivToClaim.amount.toFixed(2)}
                                            </span>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Commission Deduction Type</label>
                                        <div className="grid grid-cols-2 gap-2 mb-3">
                                            <button type="button" onClick={() => { setDivCommissionType('FLAT'); setDivCommissionVal(selectedDivToClaim.currency === 'HKD' ? '15.00' : '1.99'); }} className={`py-1.5 rounded-lg text-xs font-bold transition-all border ${divCommissionType === 'FLAT' ? 'bg-indigo-950/40 text-indigo-400 border-indigo-500' : 'border-slate-800 opacity-60'}`}>💵 Flat Broker Fee</button>
                                            <button type="button" onClick={() => { setDivCommissionType('PERCENT'); setDivCommissionVal('30'); }} className={`py-1.5 rounded-lg text-xs font-bold transition-all border ${divCommissionType === 'PERCENT' ? 'bg-indigo-950/40 text-indigo-400 border-indigo-500' : 'border-slate-800 opacity-60'}`}>٪ Percentage / Tax</button>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            <div className="col-span-2">
                                                <input type="number" step="any" value={divCommissionVal} onChange={(e) => setDivCommissionVal(e.target.value)} className="w-full p-2 bg-slate-900 rounded border border-slate-700 text-sm text-white focus:outline-none focus:ring-1 focus:ring-indigo-550" required />
                                            </div>
                                            <div className="bg-slate-800 flex items-center justify-center rounded border border-slate-700 font-bold text-xs text-slate-300">
                                                {divCommissionType === 'FLAT' ? selectedDivToClaim.currency : '%'}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 pt-4">
                                        <button type="button" onClick={() => { setIsClaimDivModalOpen(false); setSelectedDivToClaim(null); }} className="py-2 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl text-xs">Cancel</button>
                                        <button type="submit" className="py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-xs">Confirm Reinvestment</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ADD ASSET MODAL */}
                    {isAddModalOpen && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-slide-in">
                            <div className="w-full max-w-md p-6 rounded-2xl border border-slate-800 bg-slate-900 text-white shadow-2xl">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="font-extrabold text-lg">Add Custom Holding</h3>
                                    <button onClick={() => setIsAddModalOpen(false)} className="text-sm hover:text-white opacity-50">✕</button>
                                </div>
                                <form onSubmit={handleAddAsset} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Asset Symbol</label>
                                            <input type="text" placeholder="e.g. VTI" value={newSymbol} onChange={(e) => setNewSymbol(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Trading Currency</label>
                                            <select value={newCurrency} onChange={(e) => setNewCurrency(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none">
                                                <option value="USD" className="bg-slate-900 text-slate-100">USD ($)</option>
                                                <option value="HKD" className="bg-slate-900 text-slate-100">HKD (HK$)</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Asset Name</label>
                                        <input type="text" placeholder="e.g. Vanguard ETF" value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Qty</label>
                                            <input type="number" step="any" placeholder="0" value={newShares} onChange={(e) => setNewShares(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Price</label>
                                            <input type="number" step="any" placeholder="0.00" value={newPrice} onChange={(e) => setNewPrice(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Expense %</label>
                                            <input type="number" step="any" placeholder="0.10" value={newExpenseRatio} onChange={(e) => setNewExpenseRatio(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-bold">Add Position</button>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
