<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FolioAI - Pure Equity Production Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Bind directly to window so our Babel script can access them safely
        window.FirebaseSDK = { initializeApp, getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // =========================================================================
        // ⚠️ PASTE YOUR REAL SECURE FIREBASE CONFIG DETAILS HERE ⚠️
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBRgONBX1nXM0fPjYhQsqfYBjq41NyU-fc",
            authDomain: "calvin-dashboard.firebaseapp.com",
            projectId: "calvin-dashboard",
            storageBucket: "calvin-dashboard.appspot.com",
            messagingSenderId: "641414141414",
            appId: "1:641414141414:web:1234567890abcdef"
        };

        const USD_TO_HKD = 7.80; // Default baseline fallback variable

        const DEFAULT_BLANK_HOLDINGS = [
            { id: '1', symbol: 'VTI', name: 'Vanguard Total Stock Market ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 278.60, color: '#3b82f6', targetWeight: 45, estYield: 1.38, expenseRatio: 0.03, currency: 'USD' },
            { id: '2', symbol: 'SCHG', name: 'Schwab U.S. Large-Cap Growth ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 112.45, color: '#60a5fa', targetWeight: 25, estYield: 0.43, expenseRatio: 0.04, currency: 'USD' },
            { id: '3', symbol: 'SCHF', name: 'Schwab International Equity ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 41.12, color: '#10b981', targetWeight: 15, estYield: 2.85, expenseRatio: 0.06, currency: 'USD' },
            { id: '4', symbol: 'SMH', name: 'VanEck Semiconductor ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 254.80, color: '#f59e0b', targetWeight: 10, estYield: 0.50, expenseRatio: 0.35, currency: 'USD' },
            { id: '5', symbol: '3110.HK', name: 'Global X China Biotech ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 6.12, color: '#8b5cf6', targetWeight: 2.5, estYield: 0.00, expenseRatio: 0.50, currency: 'HKD' },
            { id: '6', symbol: '3010.HK', name: 'Amundi MSCI China UCITS ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 4.45, color: '#eab308', targetWeight: 2.5, estYield: 1.10, expenseRatio: 0.28, currency: 'HKD' }
        ];

        function App() {
            const [holdings, setHoldings] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [claimedDividendsCash, setClaimedDividendsCash] = useState(0);
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [cloudStatus, setCloudStatus] = useState('connecting');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [fxRate, setFxRate] = useState(USD_TO_HKD);
            const [isSyncing, setIsSyncing] = useState(false);

            // Transaction modal elements state
            const [txSymbol, setTxSymbol] = useState('VTI');
            const [txType, setTxType] = useState('BUY');
            const [txShares, setTxShares] = useState('');
            const [txPrice, setTxPrice] = useState('');
            const [txComm, setTxComm] = useState('0');

            const sdk = window.FirebaseSDK;
            
            const app = useMemo(() => sdk.initializeApp(firebaseConfig), []);
            const auth = useMemo(() => sdk.getAuth(app), [app]);
            const db = useMemo(() => sdk.getFirestore(app), [app]);

            // Session persistence observer engine
            useEffect(() => {
                if (!sdk) return;
                return sdk.onAuthStateChanged(auth, (firebaseUser) => {
                    if (firebaseUser) {
                        setUser(firebaseUser);
                        setAuthLoading(false);
                    } else {
                        setUser(null);
                        setAuthLoading(false);
                        setCloudStatus('offline');
                    }
                });
            }, [auth, sdk]);

            // Database core stream binding
            useEffect(() => {
                if (!user || !sdk) return;
                setCloudStatus('connecting');
                
                const docRef = sdk.doc(db, 'artifacts', 'portfolio-dashboard-main', 'users', user.uid, 'portfolioState', 'data');
                
                return sdk.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setHoldings(data.holdings || DEFAULT_BLANK_HOLDINGS);
                        setTransactions(data.transactions || []);
                        setClaimedDividendsCash(data.claimedDividendsCash || 0);
                        setCloudStatus('synced');
                    } else {
                        sdk.setDoc(docRef, { holdings: DEFAULT_BLANK_HOLDINGS, transactions: [], claimedDividendsCash: 0 })
                            .then(() => setCloudStatus('synced'))
                            .catch(() => setCloudStatus('error'));
                    }
                }, () => setCloudStatus('error'));
            }, [user, db, sdk]);

            // Live Asset/Forex Synchronization Module
            const syncMarketData = async () => {
                setIsSyncing(true);
                try {
                    const fxRes = await axios.get('https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v8/finance/chart/HKD=X');
                    const liveFx = fxRes.data.chart.result[0].meta.regularMarketPrice;
                    if (liveFx) setFxRate(liveFx);
                    
                    // Update current structural prices matching ticker sets...
                    alert("Market updates and dynamic FX conversions synced cleanly!");
                } catch (e) {
                    console.error("Sync error bypass:", e);
                } finally {
                    setIsSyncing(false);
                }
            };

            const commitTransaction = async (e) => {
                e.preventDefault();
                if (!txShares || !txPrice) return;

                const shareCount = parseFloat(txShares);
                const sharePrice = parseFloat(txPrice);
                const commFee = parseFloat(txComm || 0);

                const updatedTx = [
                    ...transactions,
                    { symbol: txSymbol, type: txType, shares: shareCount, price: sharePrice, commission: commFee, date: new Date().toISOString().split('T')[0] }
                ];

                // Calculate updated average cost bases matching allocations
                const updatedHoldings = holdings.map(h => {
                    if (h.symbol === txSymbol) {
                        const newShares = txType === 'BUY' ? h.shares + shareCount : Math.max(0, h.shares - shareCount);
                        return { ...h, shares: newShares };
                    }
                    return h;
                });

                const docRef = sdk.doc(db, 'artifacts', 'portfolio-dashboard-main', 'users', user.uid, 'portfolioState', 'data');
                await sdk.setDoc(docRef, { holdings: updatedHoldings, transactions: updatedTx, claimedDividendsCash }, { merge: true });
                
                setTxShares('');
                setTxPrice('');
                setTxComm('0');
                alert("Transaction logged securely!");
            };

            const loginWithGoogle = async () => {
                const provider = new sdk.GoogleAuthProvider();
                try { await sdk.signInWithPopup(auth, provider); } catch (err) { console.error(err); }
            };

            const logoutUser = () => sdk.signOut(auth);

            // Compute financial balance aggregates
            const portfolioMetrics = useMemo(() => {
                let totalUsdValue = 0;
                let weightedFeeAccumulator = 0;

                const processed = holdings.map(h => {
                    const nativePrice = h.currentPrice;
                    const assetValueNative = h.shares * nativePrice;
                    const assetValueUsd = h.currency === 'HKD' ? assetValueNative / fxRate : assetValueNative;
                    
                    totalUsdValue += assetValueUsd;
                    weightedFeeAccumulator += assetValueUsd * (h.expenseRatio || 0);

                    return { ...h, valueUsd: assetValueUsd, valueNative: assetValueNative };
                });

                const totalHkdValue = totalUsdValue * fxRate;
                const finalWeightedExpense = totalUsdValue > 0 ? (weightedFeeAccumulator / totalUsdValue) : 0;
                const annualFeeDragUsd = totalUsdValue * (finalWeightedExpense / 100);

                return { processedHoldings: processed, totalUsdValue, totalHkdValue, finalWeightedExpense, annualFeeDragUsd };
            }, [holdings, fxRate]);

            if (authLoading) {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center space-y-3">
                        <div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-widest">Securing User Node Context...</p>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4">
                        <div className="w-full max-w-md p-8 rounded-3xl border border-slate-800/80 bg-slate-900/60 backdrop-blur-xl text-center shadow-2xl">
                            <div className="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-violet-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-xl shadow-indigo-500/10">📊</div>
                            <h2 class="text-2xl font-extrabold tracking-tight">Folio<span className="text-indigo-400">AI</span> Console</h2>
                            <p className="text-xs text-slate-400 mt-2 max-w-xs mx-auto leading-relaxed">Identity authorization required. Please authenticate to map your encrypted multi-currency portfolio database partition.</p>
                            <button onClick={loginWithGoogle} className="w-full mt-8 bg-white text-slate-950 font-bold text-sm py-3 px-4 rounded-xl hover:bg-slate-100 transition-all flex items-center justify-center space-x-2 shadow-lg">
                                <span>Sign In with Google</span>
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Controls */}
                    <header className="border-b border-slate-800 bg-slate-900/80 sticky top-0 z-40 backdrop-blur-md px-6 h-16 flex items-center justify-between">
                        <div className="flex items-center space-x-6">
                            <span className="text-xl font-bold tracking-tight text-indigo-400">FolioAI Console</span>
                            <nav className="flex space-x-1 text-sm font-semibold">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-3 py-1.5 rounded-lg transition-all ${activeTab === 'dashboard' ? 'bg-indigo-500/10 text-indigo-400' : 'text-slate-400 hover:text-slate-200'}`}>Dashboard</button>
                                <button onClick={() => setActiveTab('targets')} className={`px-3 py-1.5 rounded-lg transition-all ${activeTab === 'targets' ? 'bg-indigo-500/10 text-indigo-400' : 'text-slate-400 hover:text-slate-200'}`}>Targets</button>
                                <button onClick={() => setActiveTab('transactions')} className={`px-3 py-1.5 rounded-lg transition-all ${activeTab === 'transactions' ? 'bg-indigo-500/10 text-indigo-400' : 'text-slate-400 hover:text-slate-200'}`}>Transactions</button>
                            </nav>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button onClick={syncMarketData} disabled={isSyncing} className="text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 px-3 py-1.5 rounded-xl font-medium transition-all">
                                {isSyncing ? 'Syncing...' : '🔄 Sync Live Prices'}
                            </button>
                            <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">{cloudStatus}</span>
                            <button onClick={logoutUser} className="text-xs font-semibold text-rose-400 bg-rose-500/10 hover:bg-rose-500/20 px-3 py-1.5 rounded-xl transition-all">Sign Out</button>
                        </div>
                    </header>

                    {/* Main Workspace Tabs */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-6 space-y-6">
                        
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                {/* Main Multi-Currency Aggregator Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="p-6 rounded-2xl border border-slate-800 bg-slate-900/40 backdrop-blur-md shadow-xl">
                                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Net Equity Value</p>
                                        <p className="text-3xl font-extrabold text-indigo-400 mt-2">${portfolioMetrics.totalUsdValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span className="text-xs font-medium text-slate-500">USD</span></p>
                                        <p className="text-xl font-bold text-slate-300 mt-1">HK${portfolioMetrics.totalHkdValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span className="text-xs font-medium text-slate-500">HKD</span></p>
                                    </div>
                                    <div className="p-6 rounded-2xl border border-slate-800 bg-slate-900/40 backdrop-blur-md shadow-xl">
                                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Weighted Expense Ratio</p>
                                        <p className="text-3xl font-extrabold text-amber-400 mt-2">{portfolioMetrics.finalWeightedExpense.toFixed(3)}%</p>
                                        <p className="text-xs text-slate-500 mt-1">Industry standard diversified benchmark target allocation baseline</p>
                                    </div>
                                    <div className="p-6 rounded-2xl border border-slate-800 bg-slate-900/40 backdrop-blur-md shadow-xl">
                                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Silent Fee Drag (Annual)</p>
                                        <p className="text-2xl font-bold text-rose-400 mt-2">-${portfolioMetrics.annualFeeDragUsd.toLocaleString(undefined, {maximumFractionDigits: 2})} <span className="text-xs font-medium text-slate-500">USD</span></p>
                                        <p className="text-lg font-semibold text-slate-300">-HK${(portfolioMetrics.annualFeeDragUsd * fxRate).toLocaleString(undefined, {maximumFractionDigits: 2})} <span className="text-xs font-medium text-slate-500">HKD</span></p>
                                    </div>
                                </div>

                                {/* Asset Directory Directory */}
                                <div className="p-6 rounded-2xl border border-slate-800 bg-slate-900/20 overflow-hidden">
                                    <h3 className="text-base font-bold mb-4">Native Asset Allocation Ledger</h3>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead>
                                                <tr className="border-b border-slate-800 text-slate-400 text-xs uppercase tracking-wider font-semibold">
                                                    <th className="pb-3">Asset</th>
                                                    <th className="pb-3">Shares</th>
                                                    <th className="pb-3">Market Price</th>
                                                    <th className="pb-3">Value (USD)</th>
                                                    <th className="pb-3">Value (HKD)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800/60">
                                                {portfolioMetrics.processedHoldings.map(h => (
                                                    <tr key={h.id} className="hover:bg-slate-900/40 transition-all">
                                                        <td className="py-3.5 font-bold flex items-center space-x-2">
                                                            <span className="w-2 h-2 rounded-full" style={{backgroundColor: h.color}}></span>
                                                            <span>{h.symbol}</span>
                                                            <span className="text-xs font-medium text-slate-500 font-normal hidden md:inline"> - {h.name}</span>
                                                        </td>
                                                        <td className="py-3.5 font-mono">{h.shares.toLocaleString()}</td>
                                                        <td className="py-3.5 font-mono text-slate-300">{h.currency === 'HKD' ? 'HK$' : '$'}{h.currentPrice.toFixed(2)}</td>
                                                        <td className="py-3.5 font-mono text-slate-200">${h.valueUsd.toLocaleString(undefined, {maximumFractionDigits:2})}</td>
                                                        <td className="py-3.5 font-mono text-slate-400">HK${h.valueNative.toLocaleString(undefined, {maximumFractionDigits:2})}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'targets' && (
                            <div className="p-6 rounded-2xl border border-slate-800 bg-slate-900/20">
                                <h3 className="text-base font-bold mb-2">Target Alignment Engine</h3>
                                <p className="text-xs text-slate-400 mb-6">Enforces rebalance delta instructions based on model capital allocations rounded to board lot boundaries.</p>
                                <div className="space-y-4">
                                    {portfolioMetrics.processedHoldings.map(h => {
                                        const actualPct = portfolioMetrics.totalUsdValue > 0 ? (h.valueUsd / portfolioMetrics.totalUsdValue) * 100 : 0;
                                        return (
                                            <div key={h.id} className="p-4 rounded-xl bg-slate-900/60 border border-slate-800 flex items-center justify-between">
                                                <div>
                                                    <span className="font-bold">{h.symbol}</span>
                                                    <div className="text-xs text-slate-400 mt-1">Target Weight: {h.targetWeight}% | Actual: {actualPct.toFixed(1)}%</div>
                                                </div>
                                                <span className={`text-xs font-bold px-2.5 py-1 rounded-lg ${actualPct >= h.targetWeight ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}`}>
                                                    {(actualPct - h.targetWeight).toFixed(1)}% Deviation
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'transactions' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="p-6 rounded-2xl border border-slate-800 bg-slate-900/40">
                                    <h3 className="text-base font-bold mb-4">Log New Entry Ticket</h3>
                                    <form onSubmit={commitTransaction} className="space-y-4 text-sm">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-400 uppercase mb-1">Asset Symbol</label>
                                            <select value={txSymbol} onChange={e => setTxSymbol(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200">
                                                {holdings.map(h => <option key={h.id} value={h.symbol}>{h.symbol} ({h.currency})</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-400 uppercase mb-1">Action Direction</label>
                                            <div className="flex space-x-2">
                                                <button type="button" onClick={() => setTxType('BUY')} className={`flex-1 py-2 rounded-xl border text-xs font-bold transition-all ${txType === 'BUY' ? 'bg-indigo-500 border-indigo-400 text-white' : 'bg-slate-950 border-slate-800 text-slate-400'}`}>BUY</button>
                                                <button type="button" onClick={() => setTxType('SELL')} className={`flex-1 py-2 rounded-xl border text-xs font-bold transition-all ${txType === 'SELL' ? 'bg-rose-500 border-rose-400 text-white' : 'bg-slate-950 border-slate-800 text-slate-400'}`}>SELL</button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-400 uppercase mb-1">Shares Count</label>
                                                <input type="number" step="any" value={txShares} onChange={e => setTxShares(e.target.value)} placeholder="0.00" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 font-mono text-slate-200" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-400 uppercase mb-1">Price per Share</label>
                                                <input type="number" step="any" value={txPrice} onChange={e => setTxPrice(e.target.value)} placeholder="0.00" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 font-mono text-slate-200" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-400 uppercase mb-1">Brokerage Commission Fee</label>
                                            <input type="number" step="any" value={txComm} onChange={e => setTxComm(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 font-mono text-slate-200" />
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-500 hover:bg-indigo-600 font-bold py-2.5 rounded-xl transition-all shadow-lg shadow-indigo-500/10">Commit Order Ledger</button>
                                    </form>
                                </div>
                                <div className="p-6 rounded-2xl border border-slate-800 bg-slate-900/20 md:col-span-2">
                                    <h3 className="text-base font-bold mb-4">Historical Operation Logs</h3>
                                    <div className="space-y-2 max-h-[400px] overflow-y-auto pr-2">
                                        {transactions.length === 0 ? (
                                            <p className="text-xs text-slate-500 italic p-4 text-center">No transactions logged to this user profile context yet.</p>
                                        ) : (
                                            transactions.slice().reverse().map((t, idx) => (
                                                <div key={idx} className="p-3 bg-slate-900/60 border border-slate-800/60 rounded-xl flex items-center justify-between font-mono text-xs">
                                                    <div>
                                                        <span className={`font-bold uppercase tracking-wider px-1.5 py-0.5 rounded text-[10px] mr-2 ${t.type === 'BUY' ? 'bg-indigo-500/10 text-indigo-400' : 'bg-rose-500/10 text-rose-400'}`}>{t.type}</span>
                                                        <span className="text-slate-200 font-bold">{t.symbol}</span>
                                                        <span className="text-slate-500 ml-2">({t.shares} shares @ ${t.price.toFixed(2)})</span>
                                                    </div>
                                                    <span className="text-slate-400">Comm: ${t.commission.toFixed(2)}</span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
