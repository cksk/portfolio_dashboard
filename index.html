                                                onClick={() => setIsDripEnabled(true)} 
                                                className={`py-2 rounded-xl text-xs font-bold transition-all border ${isDripEnabled ? 'bg-indigo-950/40 text-emerald-400 border-emerald-500' : 'border-slate-800 opacity-60'}`}
                                            >
                                                🔄 DRIP Reinvest
                                            </button>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <div>
                                            <div className="flex justify-between text-xs mb-1">
                                                <span className="opacity-75 font-semibold">Annual Capital CAGR</span>
                                                <span className="text-indigo-400 font-bold">{projectorCagr}%</span>
                                            </div>
                                            <input 
                                                type="range" min="0" max="15" step="0.5" 
                                                value={projectorCagr} 
                                                onChange={(e) => setProjectorCagr(parseFloat(e.target.value))}
                                                className="w-full accent-indigo-500 bg-slate-800 h-1.5 rounded-lg appearance-none cursor-pointer" 
                                            />
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-xs mb-1">
                                                <span className="opacity-75 font-semibold">Timeline Span</span>
                                                <span className="text-indigo-400 font-bold">{projectorYears} Years</span>
                                            </div>
                                            <input 
                                                type="range" min="1" max="30" step="1" 
                                                value={projectorYears} 
                                                onChange={(e) => setProjectorYears(parseInt(e.target.value))}
                                                className="w-full accent-indigo-500 bg-slate-800 h-1.5 rounded-lg appearance-none cursor-pointer" 
                                            />
                                        </div>
                                    </div>
                                    <div className="pt-4 border-t border-slate-800/80 space-y-2 text-xs">
                                        <div className="flex justify-between">
                                            <span className="opacity-60">Implied Weighted Yield:</span>
                                            <span className="font-bold text-emerald-400">{dripCompoundingProjection.averageYieldPct.toFixed(2)}%</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="opacity-60">Projected Dividends Cash:</span>
                                            <span className="font-semibold text-slate-300">${Math.round(dripCompoundingProjection.totalPayoutsEarnedUSD).toLocaleString()} USD</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:col-span-8 space-y-6">
                                    <div className={`p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-slate-200'}`}>
                                        <h3 className="font-bold text-lg mb-4">Projected Compounding Performance</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="p-4 rounded-xl bg-indigo-950/20 border border-indigo-500/10">
                                                <span className="text-[10px] uppercase font-bold tracking-wider text-indigo-400 block">Scenario Terminal value</span>
                                                <span className="text-xl font-extrabold text-white block">USD ${dripCompoundingProjection.terminalValueUSD.toLocaleString('en-US', { maximumFractionDigits: 2 })}</span>
                                                <span className="text-sm font-semibold text-slate-400">HKD ${dripCompoundingProjection.terminalValueHKD.toLocaleString('en-US', { maximumFractionDigits: 2 })}</span>
                                            </div>
                                            <div className="p-4 rounded-xl bg-slate-900/40 border border-slate-800">
                                                <span className="text-[10px] uppercase font-bold tracking-wider text-emerald-400 block">Cumulative Payout Yield</span>
                                                <span className="text-xl font-extrabold text-white block">USD ${dripCompoundingProjection.totalPayoutsEarnedUSD.toLocaleString('en-US', { maximumFractionDigits: 2 })}</span>
                                                <span className="text-sm font-semibold text-slate-400">HKD ${dripCompoundingProjection.totalPayoutsEarnedHKD.toLocaleString('en-US', { maximumFractionDigits: 2 })}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className={`p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-slate-200'}`}>
                                        <h3 className="font-bold text-lg mb-1">Trailing 12-Month (TTM) Dividend Ledger</h3>
                                        <p className="text-[11px] opacity-60 mb-6">Visual monthly trajectory of claimed transaction payouts</p>
                                        <div className="flex items-end justify-between h-32 pt-2 border-b border-slate-800 px-2">
                                            {ttmMonthlyIncome.map(bar => {
                                                const maxVal = Math.max(...ttmMonthlyIncome.map(b => b.amountUSD)) || 1;
                                                const percentHeight = (bar.amountUSD / maxVal) * 85;
                                                return (
                                                    <div key={bar.month} className="flex flex-col items-center flex-1 group">
                                                        <div className="text-[9px] text-emerald-400 font-bold opacity-0 group-hover:opacity-100 transition-opacity mb-1">
                                                            ${Math.round(bar.amountUSD)}
                                                        </div>
                                                        <div 
                                                            className="w-6 bg-emerald-500/80 rounded-t hover:bg-emerald-400 transition-all cursor-pointer"
                                                            style={{ height: `${Math.max(4, percentHeight)}px` }}
                                                            title={`USD: $${bar.amountUSD.toFixed(2)} | HKD: $${bar.amountHKD.toFixed(2)}`}
                                                        ></div>
                                                        <span className="text-[10px] opacity-50 font-bold mt-2">{bar.month}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className={`p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-slate-200'}`}>
                                        <h3 className="font-bold text-lg mb-4">Historical Income Log</h3>
                                        <div className="space-y-3">
                                            {unclaimedDividends.map((div, idx) => (
                                                <div key={idx} className="p-4 rounded-xl border border-slate-800 bg-slate-900/40 flex items-center justify-between">
                                                    <div>
                                                        <span className="font-bold text-sm block">{div.symbol} Cash Flow</span>
                                                        <span className="text-[10px] opacity-60 block">Declared Ex-Date: {div.date}</span>
                                                    </div>
                                                    <div className="text-right flex items-center space-x-3">
                                                        <div>
                                                            <span className="font-extrabold text-emerald-400 block">{div.currency === 'USD' ? '$' : 'HK$'}{div.amount.toFixed(2)}</span>
                                                            <span className="text-[10px] text-slate-400 block">
                                                                ({div.currency === 'USD' ? 'HK$' : '$'}{(div.currency === 'USD' ? div.amount * usdToHkd : div.amount / usdToHkd).toFixed(2)})
                                                            </span>
                                                        </div>
                                                        {div.processed ? (
                                                            <span className="text-xs font-semibold text-slate-500">PAID</span>
                                                        ) : (
                                                            <button onClick={() => triggerPromptClaimDividend(div)} className="bg-emerald-500 hover:bg-emerald-400 text-slate-950 text-xs font-bold px-2.5 py-1 rounded">Claim</button>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: TRANSACTIONS LOG */}
                        {activeTab === 'transactions' && (
                            <div className={`p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                                <h3 className="font-bold text-lg mb-1">Transaction History Ledger</h3>
                                <p className="text-xs opacity-60 mb-4">Log of portfolio events, buy/sell executions, and dividend captures</p>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-xs sm:text-sm">
                                        <thead>
                                            <tr className="border-b border-slate-800 opacity-60 font-semibold text-[10px] tracking-wider uppercase">
                                                <th className="py-3 px-2">TX ID</th>
                                                <th className="py-3 px-2">Timestamp</th>
                                                <th className="py-3 px-2">Type</th>
                                                <th className="py-3 px-2">Asset Code</th>
                                                <th className="py-3 px-2 text-right">Shares/Qty</th>
                                                <th className="py-3 px-2 text-right">Price (Native)</th>
                                                <th className="py-3 px-2 text-right">Total Cost / Capture</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/30">
                                            {transactions.map((tx, i) => {
                                                const totalCost = tx.amount * tx.price;
                                                return (
                                                    <tr key={i} className="hover:bg-slate-800/10 transition-all">
                                                        <td className="py-3 px-2 font-mono opacity-40">{tx.id}</td>
                                                        <td className="py-3 px-2 opacity-80">{tx.date}</td>
                                                        <td className="py-3 px-2">
                                                            <span className={`px-2 py-0.5 rounded-full text-[10px] font-extrabold ${tx.type === 'BUY' ? 'bg-emerald-500/10 text-emerald-400' : tx.type === 'SELL' ? 'bg-rose-500/10 text-rose-400' : 'bg-indigo-500/10 text-indigo-400'}`}>
                                                                {tx.type}
                                                            </span>
                                                        </td>
                                                        <td className="py-3 px-2 font-bold text-indigo-400">{tx.symbol}</td>
                                                        <td className="py-3 px-2 text-right font-semibold">{tx.amount.toLocaleString()}</td>
                                                        <td className="py-3 px-2 text-right font-medium">{tx.currency === 'USD' ? '$' : 'HK$'}{tx.price.toFixed(2)}</td>
                                                        <td className={`py-3 px-2 text-right font-bold ${tx.type === 'DIVIDEND' ? 'text-emerald-400' : 'text-slate-100'}`}>
                                                            {tx.currency === 'USD' ? '$' : 'HK$'}{totalCost.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TAB: AI PORTFOLIO COPILOT */}
                        {activeTab === 'copilot' && (
                            <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                                <div className="lg:col-span-1 space-y-4">
                                    <div className={`p-5 rounded-2xl border ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                                        <h4 className="font-bold text-sm mb-2 text-indigo-400">Quick Prompts</h4>
                                        <div className="space-y-2">
                                            <button onClick={() => triggerPresetCopilotQuery('risk')} className="w-full text-left text-xs font-semibold p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 transition-all">📈 Volatility Beta Score</button>
                                            <button onClick={() => triggerPresetCopilotQuery('rebalance')} className="w-full text-left text-xs font-semibold p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 transition-all">⚖️ Order Rounding Gaps</button>
                                            <button onClick={() => triggerPresetCopilotQuery('dividends')} className="w-full text-left text-xs font-semibold p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 transition-all">💰 Compounding Taxes Drag</button>
                                        </div>
                                    </div>
                                </div>

                                <div className={`lg:col-span-3 p-6 rounded-2xl border flex flex-col justify-between h-[500px] ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-slate-200 shadow-sm'}`}>
                                    <div className="flex-1 overflow-y-auto space-y-4 pr-2 mb-4">
                                        {messages.map((m, idx) => (
                                            <div key={idx} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[85%] rounded-2xl px-4 py-3 text-xs sm:text-sm leading-relaxed ${m.sender === 'user' ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-slate-800 text-slate-100 rounded-bl-none'}`}>
                                                    <div className="font-extrabold text-[10px] tracking-wide mb-1 opacity-70">
                                                        {m.sender === 'user' ? 'YOU' : 'FOLIOAI CO-PILOT'}
                                                    </div>
                                                    <div className="whitespace-pre-line font-medium">{m.text}</div>
                                                </div>
                                            </div>
                                        ))}
                                        {isAiLoading && (
                                            <div className="flex justify-start">
                                                <div className="max-w-[85%] rounded-2xl px-4 py-3 bg-slate-800 text-slate-300 rounded-bl-none">
                                                    <div className="flex items-center space-x-1.5 py-1">
                                                        <span className="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                                                        <span className="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></span>
                                                        <span className="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></span>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <form onSubmit={handleSendMessage} className="flex items-center space-x-2 border-t border-slate-800/80 pt-4">
                                        <input 
                                            type="text" 
                                            placeholder="Ask advisor: 'Is VTI more volatile than SMH?' or 'Optimize my dividends drag'..."
                                            value={copilotInput}
                                            onChange={(e) => setCopilotInput(e.target.value)}
                                            disabled={isAiLoading}
                                            className="flex-1 px-4 py-2.5 rounded-xl text-xs sm:text-sm bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                        />
                                        <button type="submit" disabled={isAiLoading} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs sm:text-sm px-4 py-2.5 rounded-xl">Inquire</button>
                                    </form>
                                </div>
                            </div>
                        )}

                    </div>

                    {/* Dividend Collection Commission Modal Dialog */}
                    {isClaimDivModalOpen && selectedDivToClaim && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-slide-in">
                            <div className="w-full max-w-md p-6 rounded-2xl border border-slate-800 bg-slate-900 text-white shadow-2xl">
                                <h3 className="font-bold text-base mb-1">Reinvest Dividend</h3>
                                <p className="text-xs opacity-50 mb-4">Set brokerage fee or tax collection deduction details on gross payouts</p>
                                
                                <form onSubmit={executeClaimDividend} className="space-y-4">
                                    <div className="p-4 rounded-xl bg-slate-800/40 border border-slate-800 flex items-center justify-between text-xs">
                                        <div>
                                            <span className="font-bold opacity-60 block">Declared Holding</span>
                                            <span className="font-black text-sm text-indigo-400">{selectedDivToClaim.symbol}</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="font-bold opacity-60 block">Gross Distribution</span>
                                            <span className="font-black text-sm text-emerald-400">
                                                {selectedDivToClaim.currency === 'USD' ? '$' : 'HK$'}{selectedDivToClaim.amount.toFixed(2)}
                                            </span>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Commission Deduction Type</label>
                                        <div className="grid grid-cols-2 gap-2 mb-3">
                                            <button 
                                                type="button"
                                                onClick={() => {
                                                    setDivCommissionType('FLAT');
                                                    setDivCommissionVal(selectedDivToClaim.currency === 'HKD' ? '15.00' : '1.99');
                                                }}
                                                className={`py-1.5 rounded-lg text-xs font-bold transition-all border ${divCommissionType === 'FLAT' ? 'bg-indigo-950/40 text-indigo-400 border-indigo-500' : 'border-slate-800 opacity-60'}`}
                                            >
                                                💵 Flat Broker Fee
                                            </button>
                                            <button 
                                                type="button"
                                                onClick={() => {
                                                    setDivCommissionType('PERCENT');
                                                    setDivCommissionVal('30');
                                                }}
                                                className={`py-1.5 rounded-lg text-xs font-bold transition-all border ${divCommissionType === 'PERCENT' ? 'bg-indigo-950/40 text-indigo-400 border-indigo-500' : 'border-slate-800 opacity-60'}`}
                                            >
                                                ٪ Percentage / Tax
                                            </button>
                                        </div>

                                        <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">
                                            {divCommissionType === 'FLAT' ? 'Flat Commission Amount' : 'Withholding Tax / Fee Percentage'}
                                        </label>
                                        <div className="grid grid-cols-3 gap-2">
                                            <div className="col-span-2">
                                                <input 
                                                    type="number" step="any"
                                                    value={divCommissionVal} 
                                                    onChange={(e) => setDivCommissionVal(e.target.value)}
                                                    className="w-full p-2 bg-slate-800 rounded border border-slate-700 text-sm text-white focus:outline-none" 
                                                    required 
                                                />
                                            </div>
                                            <div className="bg-slate-800 flex items-center justify-center rounded border border-slate-700 font-bold text-xs text-slate-300">
                                                {divCommissionType === 'FLAT' ? selectedDivToClaim.currency : '%'}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-2 flex justify-between items-center text-xs border-t border-slate-800">
                                        <span className="opacity-60">Estimated Net payout credit:</span>
                                        <span className="font-black text-emerald-400">
                                            {selectedDivToClaim.currency === 'USD' ? '$' : 'HK$'}
                                            {(selectedDivToClaim.amount - (divCommissionType === 'FLAT' ? (parseFloat(divCommissionVal) || 0) : (selectedDivToClaim.amount * (parseFloat(divCommissionVal) || 0) / 100))).toFixed(2)}
                                        </span>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2 pt-2">
                                        <button 
                                            type="button" 
                                            onClick={() => {
                                                setIsClaimDivModalOpen(false);
                                                setSelectedDivToClaim(null);
                                            }}
                                            className="py-2 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl text-xs"
                                        >
                                            Cancel
                                        </button>
                                        <button 
                                            type="submit" 
                                            className="py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-xs"
                                        >
                                            Confirm Reinvestment
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Trade Trigger Dialog Modal */}
                    {isBuySellModalOpen && selectedAssetForModal && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="w-full max-w-md p-6 rounded-2xl border border-slate-800 bg-slate-900 text-white shadow-2xl">
                                <h3 className="font-bold text-lg mb-4">Trade Position Sim - {selectedAssetForModal.symbol}</h3>
                                <form onSubmit={handleBuySellSubmit} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <button type="button" onClick={() => setTradeType('BUY')} className={`py-1.5 rounded-xl text-xs font-bold ${tradeType==='BUY'?'bg-emerald-500/20 text-emerald-400 border border-emerald-500':'border border-slate-800'}`}>BUY</button>
                                        <button type="button" onClick={() => setTradeType('SELL')} className={`py-1.5 rounded-xl text-xs font-bold ${tradeType==='SELL'?'bg-rose-500/20 text-rose-400 border-rose-500':'border border-slate-800'}`}>SELL</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" step="any" placeholder="Shares" value={tradeAmount} onChange={(e) => setTradeAmount(e.target.value)} className="p-2 bg-slate-800 rounded border border-slate-700 text-sm" required />
                                        <input type="number" step="any" placeholder="Price" value={tradePrice} onChange={(e) => setTradePrice(e.target.value)} className="p-2 bg-slate-800 rounded border border-slate-700 text-sm" required />
                                    </div>
                                    <button type="submit" className="w-full py-2 bg-indigo-600 rounded-xl text-sm font-bold">Process Simulation Trade</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add Asset Modal */}
                    {isAddModalOpen && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="w-full max-w-md p-6 rounded-2xl border border-slate-800 bg-slate-900 text-white shadow-2xl">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="font-extrabold text-lg">Add Custom Holding</h3>
                                    <button onClick={() => setIsAddModalOpen(false)} className="text-sm hover:text-white opacity-50">✕</button>
                                </div>
                                <form onSubmit={handleAddAsset} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Asset Symbol</label>
                                            <input type="text" placeholder="e.g. VTI" value={newSymbol} onChange={(e) => setNewSymbol(e.target.value)} className="w-full p-2.5 bg-slate-800 rounded-xl border border-slate-700 text-sm" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Trading Currency</label>
                                            <select value={newCurrency} onChange={(e) => setNewCurrency(e.target.value)} className="w-full p-2.5 bg-slate-800 rounded-xl border border-slate-700 text-sm text-white">
                                                <option value="USD">USD ($)</option>
                                                <option value="HKD">HKD (HK$)</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Asset Name</label>
                                        <input type="text" placeholder="e.g. Vanguard Total Stock" value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full p-2.5 bg-slate-800 rounded-xl border border-slate-700 text-sm" required />
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Qty</label>
                                            <input type="number" step="any" placeholder="10" value={newShares} onChange={(e) => setNewShares(e.target.value)} className="w-full p-2.5 bg-slate-800 rounded-xl border border-slate-700 text-sm" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Price</label>
                                            <input type="number" step="any" placeholder="100" value={newPrice} onChange={(e) => setNewPrice(e.target.value)} className="w-full p-2.5 bg-slate-800 rounded-xl border border-slate-700 text-sm" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Expense %</label>
                                            <input type="number" step="any" placeholder="0.10" value={newExpenseRatio} onChange={(e) => setNewExpenseRatio(e.target.value)} className="w-full p-2.5 bg-slate-800 rounded-xl border border-slate-700 text-sm" required />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-bold">Add Position</button>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
