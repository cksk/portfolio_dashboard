        // --- INITIAL DATASEED FOR NEW ACCOUNTS ---
        const INITIAL_HOLDINGS = [
            { id: '1', symbol: 'VTI', name: 'Vanguard Total Stock Market ETF', category: 'Stocks', shares: 77, avgBuyPrice: 245.50, currentPrice: 278.60, color: '#3b82f6', targetWeight: 45, estYield: 1.38, lastDividendDate: '2026-03-24', dividendPerShare: 0.95, currency: 'USD', expenseRatio: 0.03 },

            { id: '3', symbol: 'SCHF', name: 'Schwab International Equity ETF', category: 'Stocks', shares: 34, avgBuyPrice: 35.40, currentPrice: 41.12, color: '#10b981', targetWeight: 15, estYield: 2.85, lastDividendDate: '2026-06-18', dividendPerShare: 0.29, currency: 'USD', expenseRatio: 0.06 },
            { id: '4', symbol: 'SMH', name: 'VanEck Semiconductor ETF', category: 'Stocks', shares: 17, avgBuyPrice: 205.10, currentPrice: 254.80, color: '#f59e0b', targetWeight: 10, estYield: 0.50, lastDividendDate: '2026-03-15', dividendPerShare: 0.31, currency: 'USD', expenseRatio: 0.35 },
            { id: '5', symbol: '3110.HK', name: 'Global X China Biotech ETF', category: 'Stocks', shares: 200, avgBuyPrice: 5.15, currentPrice: 6.12, color: '#8b5cf6', targetWeight: 2.5, estYield: 0.00, lastDividendDate: 'N/A', dividendPerShare: 0.00, currency: 'HKD', expenseRatio: 0.50 },
            { id: '6', symbol: '3010.HK', name: 'Amundi MSCI China UCITS ETF', category: 'Stocks', shares: 300, avgBuyPrice: 3.80, currentPrice: 4.45, color: '#eab308', targetWeight: 2.5, estYield: 1.10, lastDividendDate: '2026-05-10', dividendPerShare: 0.05, currency: 'HKD', expenseRatio: 0.30 }

        const INITIAL_TRANSACTIONS = [
            { id: 'tx-1', type: 'BUY', symbol: 'VTI', category: 'Stocks', amount: 77, price: 245.50, date: '2026-01-10', currency: 'USD' },
            { id: 'tx-2', type: 'BUY', symbol: 'SCHG', category: 'Stocks', amount: 58, price: 91.20, date: '2026-02-15', currency: 'USD' },
            { id: 'tx-3', type: 'BUY', symbol: 'SCHF', category: 'Stocks', amount: 34, price: 35.40, date: '2026-03-05', currency: 'USD' },
            { id: 'tx-4', type: 'BUY', symbol: 'SMH', category: 'Stocks', amount: 17, price: 205.10, date: '2026-03-22', currency: 'USD' },
            { id: 'tx-5', type: 'BUY', symbol: '3110.HK', category: 'Stocks', amount: 200, price: 5.15, date: '2026-04-02', currency: 'HKD' },
            { id: 'tx-6', type: 'BUY', symbol: '3010.HK', category: 'Stocks', amount: 300, price: 3.80, date: '2026-04-18', currency: 'HKD' }
        ];

        function App() {
            // --- PASTE YOUR FIREBASE CONFIG HERE ---
            const firebaseConfig = {
                apiKey: "AIzaSyBRgONBX1nXM0fPjYhQsqfYBjq41NyU-fc",
                authDomain: "calvin-dashboard.firebaseapp.com",
                projectId: "calvin-dashboard",
                storageBucket: "calvin-dashboard.firebasestorage.app",
                messagingSenderId: "921825941721",
                appId: "1:921825941721:web:53815a10796cb4843e06c8"
            };

            const [holdings, setHoldings] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [timeframe, setTimeframe] = useState('1M'); 
            const [isSimulatorRunning, setIsSimulatorRunning] = useState(false);
            const [selectedAssetForModal, setSelectedAssetForModal] = useState(null);
            
            // Dynamic exchange rate hook (synchronized dynamically from Yahoo Finance)
            const [usdToHkd, setUsdToHkd] = useState(7.80);
            const [lastPriceSync, setLastPriceSync] = useState(null);

            const [claimedDividendsCash, setClaimedDividendsCash] = useState(0); // in USD
            const [unclaimedDividends, setUnclaimedDividends] = useState([
                { id: 'div-1', symbol: '3010.HK', amount: 15.00, perShare: 0.05, date: '2026-05-10', processed: false, currency: 'HKD' },
                { id: 'div-2', symbol: 'VTI', amount: 73.15, perShare: 0.95, date: '2026-06-24', processed: false, simulatedUpcoming: true, currency: 'USD' }
            ]);

            // Form states
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isBuySellModalOpen, setIsBuySellModalOpen] = useState(false);
            const [isClaimDivModalOpen, setIsClaimDivModalOpen] = useState(false);
            const [selectedDivToClaim, setSelectedDivToClaim] = useState(null);

            const [newSymbol, setNewSymbol] = useState('');
            const [newName, setNewName] = useState('');
            const [newCategory, setNewCategory] = useState('Stocks');
            const [newShares, setNewShares] = useState('');
            const [newPrice, setNewPrice] = useState('');
            const [newCurrency, setNewCurrency] = useState('USD');
            const [newExpenseRatio, setNewExpenseRatio] = useState('0.10');

            const [tradeType, setTradeType] = useState('BUY');
            const [tradeAmount, setTradeAmount] = useState('');
            const [tradePrice, setTradePrice] = useState('');

            // Dividend commission form state
            const [divCommissionType, setDivCommissionType] = useState('FLAT'); 
            const [divCommissionVal, setDivCommissionVal] = useState('1.99');

            // Interactive compounding projector sliders
            const [projectorYears, setProjectorYears] = useState(10);
            const [projectorCagr, setProjectorCagr] = useState(7.5); 
            const [isDripEnabled, setIsDripEnabled] = useState(true);

            // Active Stress test index
            const [activeStressTest, setActiveStressTest] = useState(null);

            // AI Copilot
            const [copilotInput, setCopilotInput] = useState('');
            const [messages, setMessages] = useState([
                { sender: 'assistant', text: "Welcome! Your dashboard is active with Google Sign-In protection. Sync your live rates to see the latest valuation!" }
            ]);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(true);

            // Google Sign-In Auth State
            const [user, setUser] = useState(null);
            const [cloudStatus, setCloudStatus] = useState('connecting'); // connecting | synced | saving | error | unauthenticated

            useEffect(() => {
                // Use the real, globally bound window SDK directly to prevent 'tools' TypeErrors
                const sdk = window.FirebaseSDK;
                if (!sdk || firebaseConfig.apiKey === "PASTE_YOUR_API_KEY_HERE") {
                    setCloudStatus('unauthenticated');
                    return;
                }

                try {
                    const app = sdk.initializeApp(firebaseConfig);
                    const auth = sdk.getAuth(app);
                    const db = sdk.getFirestore(app);

                    // FIXED: Changed tools.onAuthStateChanged to sdk.onAuthStateChanged
                    const unsubscribe = sdk.onAuthStateChanged(auth, (currentUser) => {
                        setUser(currentUser);
                        if (currentUser) {
                            setCloudStatus('connecting');
                            
                            // FIXED: Pointing securely to your verified portfolio-dashboard-main path
                            const docRef = sdk.doc(db, 'artifacts', 'portfolio-dashboard-main', 'users', currentUser.uid, 'portfolioState', 'data');
                            
                            // FIXED: Changed tools.onSnapshot to sdk.onSnapshot
                            sdk.onSnapshot(docRef, (docSnap) => {
                                if (docSnap.exists()) {
                                    const cloudData = docSnap.data();
                                    if (cloudData.holdings) setHoldings(cloudData.holdings);
                                    if (cloudData.transactions) setTransactions(cloudData.transactions);
                                    if (typeof cloudData.claimedDividendsCash !== 'undefined') setClaimedDividendsCash(cloudData.claimedDividendsCash);
                                    if (cloudData.unclaimedDividends) setUnclaimedDividends(cloudData.unclaimedDividends);
                                    setCloudStatus('synced');
                                } else {
                                    // Fresh account fallback initialization
                                    sdk.setDoc(docRef, {
                                        holdings: INITIAL_HOLDINGS,
                                        transactions: INITIAL_TRANSACTIONS,
                                        claimedDividendsCash: 0,
                                        unclaimedDividends: [
                                            { id: 'div-1', symbol: '3010.HK', amount: 15.00, perShare: 0.05, date: '2026-05-10', processed: false, currency: 'HKD' },
                                            { id: 'div-2', symbol: 'VTI', amount: 73.15, perShare: 0.95, date: '2026-06-24', processed: false, simulatedUpcoming: true, currency: 'USD' }
                                        ]
                                    }).then(() => setCloudStatus('synced'));
                                }
                            }, () => setCloudStatus('error'));
                        } else {
                            setCloudStatus('unauthenticated');
                        }
                    });

                    return () => unsubscribe();
                } catch (err) {
                    console.error("Firebase Auth binding failed: ", err);
                    setCloudStatus('unauthenticated');
                }
            }, []);

            const handleGoogleSignIn = async () => {
                const tools = getFirebaseTools();
                const app = tools.initializeApp(firebaseConfig);
                const auth = tools.getAuth(app);
                const provider = new tools.GoogleAuthProvider();

                setCloudStatus('connecting');
                try {
                    await tools.signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Google Sign-In failed: ", error);
                    setCloudStatus('unauthenticated');
                }
            };

            const handleSignOut = async () => {
                const tools = getFirebaseTools();
                const app = tools.initializeApp(firebaseConfig);
                const auth = tools.getAuth(app);

                try {
                    await tools.signOut(auth);
                    setHoldings([]);
                    setTransactions([]);
                    setClaimedDividendsCash(0);
                    setCloudStatus('unauthenticated');
                } catch (err) {
                    console.error("Sign out failed: ", err);
                }
            };

            const saveToCloud = async (newHoldings, newTransactions, newDividendsCash, newUnclaimed) => {
                const tools = getFirebaseTools();
                if (!tools.initializeApp || !user) return;
                setCloudStatus('saving');

                try {
                    const app = tools.initializeApp(firebaseConfig);
                    const db = tools.getFirestore(app);
                    const docRef = tools.doc(db, 'artifacts', 'portfolio-dashboard-main', 'users', user.uid, 'portfolioState', 'data');
                    
                    await tools.setDoc(docRef, {
                        holdings: newHoldings,
                        transactions: newTransactions,
                        claimedDividendsCash: newDividendsCash,
                        unclaimedDividends: newUnclaimed
                    });
                    setCloudStatus('synced');
                } catch (err) {
                    console.error("Failed cloud state save: ", err);
                    setCloudStatus('error');
                }
            };

            // --- REAL-TIME DATA & FOREX SYNC (Yahoo Finance API) ---
            const syncLiveMarketPrices = async () => {
                setLastPriceSync("Syncing...");
                let updatedHoldings = [...holdings];

                // 1. Fetch live currency quote for USD/HKD forex mapping
                try {
                    const fxUrl = `https://query1.finance.yahoo.com/v8/finance/chart/HKD=X?interval=1d&range=1d`;
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(fxUrl)}`;
                    const response = await fetch(proxyUrl);
                    if (response.ok) {
                        const resJson = await response.json();
                        const contents = JSON.parse(resJson.contents);
                        const rate = contents?.chart?.result?.[0]?.meta?.regularMarketPrice;
                        if (rate) {
                            setUsdToHkd(parseFloat(rate.toFixed(4)));
                        }
                    }
                } catch (err) {
                    console.warn("Could not sync live forex rates. Fallback to peg of 7.80.");
                }

                // 2. Fetch closing price for each individual ticker
                for (let i = 0; i < updatedHoldings.length; i++) {
                    const h = updatedHoldings[i];
                    try {
                        const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${h.symbol}?interval=1d&range=2d`;
                        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                        const response = await fetch(proxyUrl);
                        
                        if (response.ok) {
                            const resJson = await response.json();
                            const contents = JSON.parse(resJson.contents);
                            const result = contents?.chart?.result?.[0];
                            if (result) {
                                const currentPrice = result.meta.regularMarketPrice;
                                updatedHoldings[i] = {
                                    ...h,
                                    currentPrice: parseFloat(currentPrice.toFixed(2))
                                };
                            }
                        }
                    } catch (err) {
                        console.warn(`Failed syncing closing quote for: ${h.symbol}`);
                    }
                }

                setHoldings(updatedHoldings);
                saveToCloud(updatedHoldings, transactions, claimedDividendsCash, unclaimedDividends);
                setLastPriceSync(new Date().toLocaleTimeString());
            };

            const totals = useMemo(() => {
                let totalValueUSD = 0;
                let totalCostUSD = 0;
                let categoryMap = {};

                holdings.forEach(h => {
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? h.currentPrice / usdToHkd : h.currentPrice;
                    const avgBuyPriceUSD = isHKD ? h.avgBuyPrice / usdToHkd : h.avgBuyPrice;

                    const valueUSD = h.shares * currentPriceUSD;
                    const costUSD = h.shares * avgBuyPriceUSD;

                    totalValueUSD += valueUSD;
                    totalCostUSD += costUSD;

                    if (!categoryMap[h.category]) {
                        categoryMap[h.category] = { name: h.category, value: 0, color: h.color };
                    }
                    categoryMap[h.category].value += valueUSD;
                });

                const totalGainUSD = totalValueUSD - totalCostUSD;
                const gainPercentage = totalCostUSD > 0 ? (totalGainUSD / totalCostUSD) * 100 : 0;

                const categories = Object.values(categoryMap).map(c => ({
                    ...c,
                    percentage: totalValueUSD > 0 ? (c.value / totalValueUSD) * 100 : 0
                }));

                // Calculate Weighted Expense Ratio
                let weightedExpenseRatio = 0;
                holdings.forEach(h => {
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? h.currentPrice / usdToHkd : h.currentPrice;
                    const valUSD = h.shares * currentPriceUSD;
                    const weight = totalValueUSD > 0 ? (valUSD / totalValueUSD) : 0;
                    weightedExpenseRatio += weight * h.expenseRatio;
                });

                const annualDragUSD = totalValueUSD * (weightedExpenseRatio / 100);

                // Calculate Portfolio Beta
                let portfolioBeta = 0;
                holdings.forEach(h => {
                    const isHKD = h.currency === 'HKD';
                    const valUSD = h.shares * (isHKD ? h.currentPrice / usdToHkd : h.currentPrice);
                    const weight = totalValueUSD > 0 ? (valUSD / totalValueUSD) : 0;
                    const meta = ASSET_METADATA[h.symbol] || { beta: 1.0 };
                    portfolioBeta += weight * meta.beta;
                });

                return {
                    totalValueUSD,
                    totalValueHKD: totalValueUSD * usdToHkd,
                    totalCostUSD,
                    totalCostHKD: totalCostUSD * usdToHkd,
                    totalGainUSD,
                    totalGainHKD: totalGainUSD * usdToHkd,
                    gainPercentage,
                    categories,
                    weightedExpenseRatio,
                    annualDragUSD,
                    annualDragHKD: annualDragUSD * usdToHkd,
                    portfolioBeta
                };
            }, [holdings, usdToHkd]);

            // Geographic Exposure looked through
            const geographicExposure = useMemo(() => {
                let totalsMap = { US: 0, Europe: 0, AsiaPacific: 0, ChinaHK: 0 };
                let totalPortfolioVal = totals.totalValueUSD;
                if (totalPortfolioVal === 0) return [];

                holdings.forEach(h => {
                    const meta = ASSET_METADATA[h.symbol];
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? h.currentPrice / usdToHkd : h.currentPrice;
                    const assetValUSD = h.shares * currentPriceUSD;

                    if (meta && meta.geographic) {
                        Object.keys(meta.geographic).forEach(geo => {
                            totalsMap[geo] += (meta.geographic[geo] / 100) * assetValUSD;
                        });
                    } else {
                        totalsMap.US += assetValUSD; 
                    }
                });

                return Object.keys(totalsMap).map(geo => ({
                    name: geo === 'ChinaHK' ? 'China / Hong Kong' : geo === 'AsiaPacific' ? 'Asia-Pacific (ex-China)' : geo,
                    valueUSD: totalsMap[geo],
                    percentage: (totalsMap[geo] / totalPortfolioVal) * 100
                })).sort((a,b) => b.valueUSD - a.valueUSD);
            }, [holdings, totals.totalValueUSD, usdToHkd]);

            // Sector Exposure looked through
            const sectorExposure = useMemo(() => {
                let totalsMap = { Technology: 0, Consumer: 0, Financials: 0, Healthcare: 0, Communications: 0, Industrials: 0, Other: 0 };
                let totalPortfolioVal = totals.totalValueUSD;
                if (totalPortfolioVal === 0) return [];

                holdings.forEach(h => {
                    const meta = ASSET_METADATA[h.symbol];
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? h.currentPrice / usdToHkd : h.currentPrice;
                    const assetValUSD = h.shares * currentPriceUSD;

                    if (meta && meta.sectors) {
                        Object.keys(meta.sectors).forEach(sec => {
                            totalsMap[sec] += (meta.sectors[sec] / 100) * assetValUSD;
                        });
                    } else {
                        totalsMap.Other += assetValUSD; 
                    }
                });

                return Object.keys(totalsMap).map(sec => ({
                    name: sec,
                    valueUSD: totalsMap[sec],
                    percentage: (totalsMap[sec] / totalPortfolioVal) * 100
                })).sort((a,b) => b.valueUSD - a.valueUSD);
            }, [holdings, totals.totalValueUSD, usdToHkd]);

            // Implied stock holdings looked through
            const overlaps = useMemo(() => {
                let stocksMap = {};
                let totalPortfolioVal = totals.totalValueUSD;
                if (totalPortfolioVal === 0) return [];

                holdings.forEach(h => {
                    const meta = ASSET_METADATA[h.symbol];
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? h.currentPrice / usdToHkd : h.currentPrice;
                    const assetValUSD = h.shares * currentPriceUSD;

                    if (meta && meta.holdings) {
                        Object.keys(meta.holdings).forEach(ticker => {
                            if (!stocksMap[ticker]) {
                                stocksMap[ticker] = {
                                    symbol: ticker,
                                    sources: [],
                                    totalValueUSD: 0
                                };
                            }
                            const weightInEtf = meta.holdings[ticker] / 100;
                            const impliedValUSD = weightInEtf * assetValUSD;
                            stocksMap[ticker].totalValueUSD += impliedValUSD;
                            stocksMap[ticker].sources.push({
                                etf: h.symbol,
                                weight: meta.holdings[ticker],
                                valueUSD: impliedValUSD
                            });
                        });
                    }
                });

                return Object.values(stocksMap).map(stock => ({
                    ...stock,
                    percentage: (stock.totalValueUSD / totalPortfolioVal) * 100
                })).sort((a, b) => b.totalValueUSD - a.totalValueUSD);
            }, [holdings, totals.totalValueUSD, usdToHkd]);

            // --- STRESS-TEST SCENARIO DEFINITIONS ---
            const STRESS_TEST_CATALOG = {
                techCrash: {
                    name: "2000 Dot-Com Peak Crash Simulation",
                    description: "Tech sectors collapse 70% while international and defensive assets decline moderately.",
                    multipliers: { Technology: 0.30, Healthcare: 0.85, Communications: 0.40, Financials: 0.70, Consumer: 0.80, Industrials: 0.75, Other: 0.85 }
                },
                semiconductorShock: {
                    name: "Global Semiconductor Shortage Crisis",
                    description: "Semiconductor supply halts. SMH drops 45%, growth sectors fall 25%. Defensive global buffers retain weight.",
                    multipliers: { Technology: 0.55, Healthcare: 0.95, Communications: 0.80, Financials: 0.90, Consumer: 0.85, Industrials: 0.70, Other: 0.90 }
                },
                tradeWar: {
                    name: "Sino-US Trade Tariff War Shock",
                    description: "Extreme trade blockades. China/HK assets drop 40%, international drops 15%, US tech drops 10%.",
                    multipliers: { Technology: 0.90, Healthcare: 0.75, Communications: 0.85, Financials: 0.80, Consumer: 0.70, Industrials: 0.65, Other: 0.80 },
                    regionalDrag: { ChinaHK: 0.60, US: 0.90, Europe: 0.85, AsiaPacific: 0.80 }
                }
            };

            const stressTestResult = useMemo(() => {
                if (!activeStressTest) return null;
                const scenario = STRESS_TEST_CATALOG[activeStressTest];
                if (!scenario) return null;

                let postStressValueUSD = 0;

                holdings.forEach(h => {
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? h.currentPrice / usdToHkd : h.currentPrice;
                    const valueUSD = h.shares * currentPriceUSD;

                    const meta = ASSET_METADATA[h.symbol];
                    let assetStressMultiplier = 1.0;

                    if (meta && meta.sectors) {
                        let weightedMultiplier = 0;
                        Object.keys(meta.sectors).forEach(sec => {
                            const sectorWeight = meta.sectors[sec] / 100;
                            const sectorMultiplier = scenario.multipliers[sec] ?? 1.0;
                            weightedMultiplier += sectorWeight * sectorMultiplier;
                        });
                        assetStressMultiplier = weightedMultiplier;
                    }

                    // Apply regional drag factor if scenario specifies it
                    if (scenario.regionalDrag && meta && meta.geographic) {
                        let regionalMultiplier = 0;
                        Object.keys(meta.geographic).forEach(geo => {
                            const geoWeight = meta.geographic[geo] / 100;
                            const geoFactor = scenario.regionalDrag[geo] ?? 1.0;
                            regionalMultiplier += geoWeight * geoFactor;
                        });
                        // Blend sector and regional drag factor
                        assetStressMultiplier = (assetStressMultiplier + regionalMultiplier) / 2;
                    }

                    postStressValueUSD += valueUSD * assetStressMultiplier;
                });

                const lossUSD = totals.totalValueUSD - postStressValueUSD;
                const lossPct = totals.totalValueUSD > 0 ? (lossUSD / totals.totalValueUSD) * 100 : 0;

                return {
                    postValueUSD: postStressValueUSD,
                    postValueHKD: postStressValueUSD * usdToHkd,
                    lossUSD,
                    lossHKD: lossUSD * usdToHkd,
                    lossPct
                };
            }, [activeStressTest, holdings, totals.totalValueUSD, usdToHkd]);

            // --- DRIP CALCULATOR FORMULA WITH FX SYNC ---
            const dripCompoundingProjection = useMemo(() => {
                const years = projectorYears;
                const rate = projectorCagr / 100;
                
                // Average Weighted yield
                let totalDividendYieldUSD = 0;
                holdings.forEach(h => {
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? h.currentPrice / usdToHkd : h.currentPrice;
                    const valueUSD = h.shares * currentPriceUSD;
                    totalDividendYieldUSD += valueUSD * (h.estYield / 100);
                });
                
                const averageYield = totals.totalValueUSD > 0 ? (totalDividendYieldUSD / totals.totalValueUSD) : 0;
                
                // Simple compounding projection over years (Quarterly compounding)
                const n = 4; // Compound frequency
                const principal = totals.totalValueUSD;
                
                // DRIP Reinvestment projection
                let terminalValueDrip = principal;
                let totalPayoutsEarnedDrip = 0;

                for (let period = 1; period <= years * n; period++) {
                    const divPayout = terminalValueDrip * (averageYield / n);
                    const capitalGain = terminalValueDrip * (rate / n);
                    totalPayoutsEarnedDrip += divPayout;
                    
                    if (isDripEnabled) {
                        terminalValueDrip += divPayout + capitalGain;
                    } else {
                        terminalValueDrip += capitalGain;
                    }
                }

                return {
                    terminalValueUSD: terminalValueDrip,
                    terminalValueHKD: terminalValueDrip * usdToHkd,
                    averageYieldPct: averageYield * 100,
                    totalPayoutsEarnedUSD: totalPayoutsEarnedDrip,
                    totalPayoutsEarnedHKD: totalPayoutsEarnedDrip * usdToHkd
                };
            }, [holdings, totals.totalValueUSD, projectorYears, projectorCagr, isDripEnabled, usdToHkd]);

            // --- TRAILING 12-MONTH (TTM) DIVIDEND LEDGER GENERATION ---
            const ttmMonthlyIncome = useMemo(() => {
                // Initialize clean monthly calendar mapping
                let calendar = { Jan: 0, Feb: 0, Mar: 0, Apr: 0, May: 0, Jun: 0, Jul: 0, Aug: 0, Sep: 0, Oct: 0, Nov: 0, Dec: 0 };
                
                // Extract last 12 Month distributions based on claimed transactions
                transactions.forEach(tx => {
                    if (tx.type === 'DIVIDEND' && tx.date) {
                        const monthIndex = new Date(tx.date).getMonth();
                        const monthName = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][monthIndex];
                        
                        const isHKD = tx.currency === 'HKD';
                        const valUSD = isHKD ? tx.amount / usdToHkd : tx.amount;
                        calendar[monthName] += valUSD;
                    }
                });

                return Object.keys(calendar).map(m => ({
                    month: m,
                    amountUSD: calendar[m],
                    amountHKD: calendar[m] * usdToHkd
                }));
            }, [transactions, usdToHkd]);

            // --- ATOMIZED OPERATIONS ---
            const handleTargetWeightChange = (id, newWeight) => {
                const val = Math.max(0, Math.min(100, parseFloat(newWeight) || 0));
                const nextHoldings = holdings.map(h => h.id === id ? { ...h, targetWeight: val } : h);
                setHoldings(nextHoldings);
                saveToCloud(nextHoldings, transactions, claimedDividendsCash, unclaimedDividends);
            };

            const triggerPromptClaimDividend = (div) => {
                setSelectedDivToClaim(div);
                setDivCommissionType('FLAT');
                setDivCommissionVal(div.currency === 'HKD' ? '15.00' : '1.99');

            };

            const executeClaimDividend = (e) => {
                e.preventDefault();
                if (!selectedDivToClaim) return;

                const div = selectedDivToClaim;
                const feeInput = parseFloat(divCommissionVal) || 0;
                
                let calculatedFee = 0;
                if (divCommissionType === 'FLAT') {
                    calculatedFee = feeInput;
                } else {
                    calculatedFee = div.amount * (feeInput / 100);
                }

                calculatedFee = Math.min(div.amount, calculatedFee);

                const isHKD = div.currency === 'HKD';
                const grossAmountUSD = isHKD ? div.amount / usdToHkd : div.amount;
                const feeAmountUSD = isHKD ? calculatedFee / usdToHkd : calculatedFee;
                
                const netAmountUSD = Math.max(0, grossAmountUSD - feeAmountUSD);
                const isDripModeActive = isDripEnabled;

                let updatedHoldings = [...holdings];

                if (isDripModeActive) {
                    // AUTO DRIP EXECUTOR: Reinvest Net Dividend back into the same holding
                    const targetIndex = holdings.findIndex(h => h.symbol === div.symbol);
                    if (targetIndex > -1) {
                        const targetAsset = holdings[targetIndex];
                        const netAmountInNativeCurrency = isHKD ? div.amount - calculatedFee : netAmountUSD;
                        const sharesToBuyFractional = netAmountInNativeCurrency / targetAsset.currentPrice;
                        
                        const updatedShares = targetAsset.shares + sharesToBuyFractional;
                        
                        // Recalculate average purchase price with commission/taxes subtracted
                        const existingCostBasis = targetAsset.shares * targetAsset.avgBuyPrice;
                        const reinvestCostBasis = sharesToBuyFractional * targetAsset.currentPrice;
                        const updatedAvgBuyPrice = (existingCostBasis + reinvestCostBasis) / updatedShares;

                        updatedHoldings[targetIndex] = {
                            ...targetAsset,
                            shares: parseFloat(updatedShares.toFixed(4)),
                            avgBuyPrice: parseFloat(updatedAvgBuyPrice.toFixed(2))
                        };
                    }
                } else {
                    // Deposit Net payout to Off-Portfolio Cash Balance
                    setClaimedDividendsCash(prev => prev + netAmountUSD);
                }

                // Update dividend notifications queue & log transaction record
                const nextUnclaimed = unclaimedDividends.map(d => d.id === div.id ? { ...d, processed: true } : d);
                setUnclaimedDividends(nextUnclaimed);
                
                const newTx = {
                    id: `div-tx-${Date.now()}`,
                    type: 'DIVIDEND',
                    symbol: div.symbol,
                    category: 'Dividend Cash',
                    amount: div.amount,
                    price: 1.00,
                    commission: calculatedFee,
                    currency: div.currency,
                    date: new Date().toISOString().split('T')[0]
                };

                const nextTx = [newTx, ...transactions];
                setTransactions(nextTx);
                saveToCloud(updatedHoldings, nextTx, isDripModeActive ? claimedDividendsCash : (claimedDividendsCash + netAmountUSD), nextUnclaimed);

                setIsClaimDivModalOpen(false);
                setSelectedDivToClaim(null);
            };

            const handleAddAsset = (e) => {
                e.preventDefault();

                const existingIndex = holdings.findIndex(h => h.symbol.toUpperCase() === newSymbol.toUpperCase());

                if (existingIndex > -1) {
                    const existing = holdings[existingIndex];
                    const updatedShares = existing.shares + sharesNum;

                    nextHoldings[existingIndex] = {
                        ...existing,
                        shares: updatedShares,
                        avgBuyPrice: parseFloat(updatedAvg.toFixed(2)),

                            const totalShares = h.shares + amountNum;

                            return { ...h, shares: totalShares, avgBuyPrice: parseFloat(newAvg.toFixed(2)), currentPrice: priceNum };
                        } else {
                            const totalShares = Math.max(0, h.shares - amountNum);
                            return { ...h, shares: totalShares, currentPrice: priceNum };
                        }
                    }
                    return h;
                }).filter(h => h.shares > 0);

                const nextTx = [{
                    id: `tx-${Date.now()}`,
                    type: tradeType,
                    symbol: selectedAssetForModal.symbol,
                    category: selectedAssetForModal.category,
                    amount: amountNum,
                    price: priceNum,
                    date: new Date().toISOString().split('T')[0],
                    currency: selectedAssetForModal.currency
                }, ...transactions];

                setHoldings(nextHoldings);
                setTransactions(nextTx);
                saveToCloud(nextHoldings, nextTx, claimedDividendsCash, unclaimedDividends);

                setIsBuySellModalOpen(false);

            const deleteHolding = (id) => {

                if (asset) {

                    const nextTx = [{

                        type: 'LIQUIDATE',

                    }, ...transactions];

                    setHoldings(nextHoldings);
                    setTransactions(nextTx);
                    saveToCloud(nextHoldings, nextTx, claimedDividendsCash, unclaimedDividends);

            // Copilot function
            const callGemini = async (userMessage) => {
                setIsAiLoading(true);

                const formattedHoldings = holdings.map(h => {
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? h.currentPrice / usdToHkd : h.currentPrice;
                    const currentPct = totals.totalValueUSD > 0 ? ((h.shares * currentPriceUSD) / totals.totalValueUSD) * 100 : 0;
                    return `- ${h.symbol}: Price: ${h.currentPrice} ${h.currency} | Weight: ${currentPct.toFixed(1)}% | Beta: ${(ASSET_METADATA[h.symbol] || {beta: 1.0}).beta}`;
                }).join('\n');

                const fullSystemPrompt = `${SYSTEM_PROMPT}\n\nCURRENT PORTFOLIO MATRIX:\n${formattedHoldings}\nTotal USD Value: $${totals.totalValueUSD.toFixed(2)}\nWeighted Portfolio Beta: ${totals.portfolioBeta.toFixed(3)}\nActive Exchange Rate: 1 USD = ${usdToHkd} HKD`;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`;

                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userMessage }] }],
                            systemInstruction: { parts: [{ text: fullSystemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    const replyText = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response received. Verify API services.";
                    setMessages(prev => [...prev, { sender: 'assistant', text: replyText }]);
                } catch (err) {
                    setMessages(prev => [...prev, { sender: 'assistant', text: "Connection anomaly. Standalone environment has limited sandbox API routing." }]);
                } finally {
                    setIsAiLoading(false);
                }
            };

            const handleSendMessage = (e) => {
                e.preventDefault();
                if (!copilotInput.trim()) return;
                const msg = copilotInput;
                setMessages(prev => [...prev, { sender: 'user', text: msg }]);
                setCopilotInput('');
                callGemini(msg);
            };

            const triggerPresetCopilotQuery = (queryType) => {
                let queryText = '';
                if (queryType === 'risk') {
                    queryText = "Analyze the overall volatility, Beta score, and expected stress outcomes of my current stock allocation.";
                } else if (queryType === 'rebalance') {
                    queryText = "Generate a cost-effective rebalancing order taking into account dual currency conversion and standard board lot rounding rules.";
                } else if (queryType === 'dividends') {
                    queryText = "Critique my compounding yield. What is the impact of dividend tax drag on my 20-year DRIP projection?";
                }
                setMessages(prev => [...prev, { sender: 'user', text: queryText }]);
                setActiveTab('copilot');
                callGemini(queryText);
            };

            // Chart Logic
            const chartPoints = useMemo(() => {
                const pointsCount = timeframe === '1D' ? 12 : timeframe === '1W' ? 7 : timeframe === '1M' ? 15 : 30;
                const seedValue = totals.totalValueUSD;
                const volatility = timeframe === '1D' ? 0.005 : timeframe === '1W' ? 0.015 : timeframe === '1M' ? 0.04 : 0.09;
                let current = seedValue * (1 - volatility * 0.5);
                const points = [];
                for (let i = 0; i < pointsCount; i++) {
                    const progress = i / (pointsCount - 1);
                    const wave = Math.sin(progress * Math.PI * 2) * (seedValue * volatility * 0.3);
                    const trend = progress * (seedValue * (totals.gainPercentage > 0 ? 0.05 : -0.02));
                    const value = current + wave + trend;
                    let label = timeframe === '1D' ? `${Math.floor(9 + (i * 8)/pointsCount)}:00` : timeframe === '1W' ? ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'][i % 7] : timeframe === '1M' ? `Day ${i+1}` : `M${Math.floor(i/2.5)+1}`;
                    points.push({ label, value });
                }
                if (points.length > 0) points[points.length - 1].value = totals.totalValueUSD;
                return points;
            }, [totals.totalValueUSD, totals.gainPercentage, timeframe]);

            const [hoveredPoint, setHoveredPoint] = useState(null);

            // --- SVG PLOT GRAPH COORDINATES ---
            const chartWidth = 600;
            const chartHeight = 200;
            const chartPadding = 35;
            const coordinates = useMemo(() => {
                if (chartPoints.length === 0) return [];
                const minVal = Math.min(...chartPoints.map(p => p.value)) * 0.99;
                const maxVal = Math.max(...chartPoints.map(p => p.value)) * 1.01;
                const valRange = maxVal - minVal || 1;
                return chartPoints.map((point, i) => {
                    const x = chartPadding + (i / (chartPoints.length - 1)) * (chartWidth - chartPadding * 2);
                    const y = chartHeight - chartPadding - ((point.value - minVal) / valRange) * (chartHeight - chartPadding * 2);
                    return { x, y, value: point.value, label: point.label };
                });
            }, [chartPoints]);

            const generatePath = () => {
                if (coordinates.length === 0) return '';
                return coordinates.reduce((path, p, i) => i === 0 ? `M ${p.x} ${p.y}` : `${path} L ${p.x} ${p.y}`, '');
            };

            const generateAreaPath = () => {
                if (coordinates.length === 0) return '';
                const path = generatePath();
                const bottomY = chartHeight - chartPadding;
                return `${path} L ${coordinates[coordinates.length-1].x} ${bottomY} L ${coordinates[0].x} ${bottomY} Z`;
            };

            if (cloudStatus === 'unauthenticated') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-950 text-slate-100">

                                <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </div>

                            </p>
                            <button 
                                onClick={handleGoogleSignIn}
                                className="w-full bg-white hover:bg-slate-100 text-slate-900 border border-slate-300 font-extrabold text-sm py-3 px-4 rounded-xl shadow transition-all flex items-center justify-center space-x-2.5"
                            >
                                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114A5.96 5.96 0 0 1 8.03 12.557a5.96 5.96 0 0 1 5.96-5.96c1.448 0 2.766.52 3.794 1.378l3.224-3.224c-1.996-1.858-4.57-3-7.018-3a10.16 10.16 0 0 0-10.16 10.16A10.16 10.16 0 0 0 13.99 22.36c5.542 0 10.02-4.542 10.02-10.02 0-.672-.054-1.343-.162-2.055H12.24z"/></svg>
                                <span>Sign In with Google</span>
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen transition-colors duration-300 ${isDarkMode ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-800'}`}>
                    
                    {/* Unclaimed Dividend Notification Banner */}
                    {unclaimedDividends.some(d => !d.processed && !d.simulatedUpcoming) && (
                        <div className="bg-gradient-to-r from-emerald-600 to-indigo-600 text-white font-semibold py-2 px-4 text-xs sm:text-sm flex flex-col sm:flex-row sm:items-center justify-between gap-2 shadow-lg animate-pulse">
                            <span>📢 Dividend Announcement! Click Claim to deposit in your Dividend Cash account.</span>
                            <div className="flex items-center space-x-2">
                                {unclaimedDividends.filter(d => !d.processed && !d.simulatedUpcoming).map(div => (
                                    <button 
                                        key={div.id}
                                        onClick={() => triggerPromptClaimDividend(div)}
                                        className="bg-slate-900/40 hover:bg-slate-950 text-emerald-300 hover:text-white px-3 py-1 rounded-lg text-xs font-bold transition-all border border-emerald-500/20"
                                    >
                                        Claim {div.currency === 'USD' ? '$' : 'HK$'}{div.amount.toFixed(2)} ({div.symbol})
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Navigation Header */}
                    <header className={`border-b ${isDarkMode ? 'border-slate-800 bg-slate-900/80' : 'border-slate-200 bg-white/80'} sticky top-0 z-40 backdrop-blur-md`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">

                                    <span className="text-xl">📊</span>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight">Folio<span className="text-indigo-400">AI</span></h1>
                                    <p className="text-[10px] opacity-60 font-medium">USD / HKD Equity Platform</p>
                                </div>

                            <div className="flex items-center space-x-3">
                                {lastPriceSync && (
                                    <span className="text-[10px] font-semibold text-slate-400 hidden sm:inline">
