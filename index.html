<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FolioAI - Pure Equity Production Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Bind directly to window so our Babel script can access them safely
        window.FirebaseSDK = { initializeApp, getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <!-- Main Dashboard Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // =========================================================================
        // ⚠️ PASTE YOUR REAL SECURE FIREBASE CONFIG DETAILS HERE ⚠️
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBRgONBX1nXM0fPjYhQsqfYBjq41NyU-fc",
            authDomain: "calvin-dashboard.firebaseapp.com",
            projectId: "calvin-dashboard",
            storageBucket: "calvin-dashboard.appspot.com",
            messagingSenderId: "1054842345678",
            appId: "1:1054842345678:web:abcdef1234567890"
        };

        // Standard Asset Baseline Template
        const DEFAULT_BLANK_HOLDINGS = [
            { id: '1', symbol: 'VTI', name: 'Vanguard Total Stock Market ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 278.60, color: '#3b82f6', targetWeight: 45, estYield: 1.38, expenseRatio: 0.03 },
            { id: '2', symbol: 'SCHG', name: 'Schwab U.S. Large-Cap Growth ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 112.45, color: '#60a5fa', targetWeight: 25, estYield: 0.43, expenseRatio: 0.04 },
            { id: '3', symbol: 'SCHF', name: 'Schwab International Equity ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 41.12, color: '#10b981', targetWeight: 15, estYield: 2.85, expenseRatio: 0.06 },
            { id: '4', symbol: 'SMH', name: 'VanEck Semiconductor ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 254.80, color: '#f59e0b', targetWeight: 10, estYield: 0.50, expenseRatio: 0.35 },
            { id: '5', symbol: '3110.HK', name: 'Global X China Biotech ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 6.12, color: '#8b5cf6', targetWeight: 2.5, estYield: 0.00, expenseRatio: 0.50 },
            { id: '6', symbol: '3010.HK', name: 'Amundi MSCI China UCITS ETF', category: 'Stocks', shares: 0, avgBuyPrice: 0, currentPrice: 4.45, color: '#eab308', targetWeight: 2.5, estYield: 1.10, expenseRatio: 0.28 }
        ];

        function App() {
            const [holdings, setHoldings] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [claimedDividendsCash, setClaimedDividendsCash] = useState(0);
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [cloudStatus, setCloudStatus] = useState('connecting');
            const [activeTab, setActiveTab] = useState('dashboard');

            // Safely reference the initialized global SDK bindings
            const sdk = window.FirebaseSDK;
            
            const app = useMemo(() => sdk.initializeApp(firebaseConfig), []);
            const auth = useMemo(() => sdk.getAuth(app), [app]);
            const db = useMemo(() => sdk.getFirestore(app), [app]);

            // --- FIXED: Secure Auth Observer with Session Caching ---
            useEffect(() => {
                if (!sdk) return;
                return sdk.onAuthStateChanged(auth, (firebaseUser) => {
                    if (firebaseUser) {
                        setUser(firebaseUser);
                        setAuthLoading(false);
                    } else {
                        setUser(null);
                        setAuthLoading(false);
                        setCloudStatus('offline');
                    }
                });
            }, [auth, sdk]);

            // --- FIXED: Cloud Firestore Synchronization Listener ---
            useEffect(() => {
                if (!user || !sdk) return;
                setCloudStatus('connecting');
                
                const docRef = sdk.doc(db, 'artifacts', 'portfolio-dashboard-main', 'users', user.uid, 'portfolioState', 'data');
                
                return sdk.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setHoldings(data.holdings || DEFAULT_BLANK_HOLDINGS);
                        setTransactions(data.transactions || []);
                        setClaimedDividendsCash(data.claimedDividendsCash || 0);
                        setCloudStatus('synced');
                    } else {
                        // Brand new user space - set up seed assets
                        sdk.setDoc(docRef, { holdings: DEFAULT_BLANK_HOLDINGS, transactions: [], claimedDividendsCash: 0 })
                            .then(() => setCloudStatus('synced'))
                            .catch(() => setCloudStatus('error'));
                    }
                }, () => setCloudStatus('error'));
            }, [user, db, sdk]);

            const loginWithGoogle = async () => {
                const provider = new sdk.GoogleAuthProvider();
                try {
                    await sdk.signInWithPopup(auth, provider);
                } catch (err) {
                    console.error("Authentication popup closed or blocked:", err);
                }
            };

            const logoutUser = () => sdk.signOut(auth);

            if (authLoading) {
                return (
                    <div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center space-y-3">
                        <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Securing User Node Context...</p>
                    </div>
                );
            }

            // Unauthenticated Login Screen Gate
            if (!user) {
                return (
                    <div class="min-h-screen bg-slate-950 flex items-center justify-center p-4">
                        <div class="w-full max-w-md p-8 rounded-3xl border border-slate-800/80 bg-slate-900/60 backdrop-blur-xl text-center shadow-2xl">
                            <div class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-violet-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-xl shadow-indigo-500/10">📊</div>
                            <h2 class="text-2xl font-extrabold tracking-tight">Folio<span class="text-indigo-400">AI</span> Console</h2>
                            <p class="text-xs text-slate-400 mt-2 max-w-xs mx-auto leading-relaxed">Identity authorization required. Please authenticate to map your encrypted multi-currency portfolio database partition.</p>
                            <button onClick={loginWithGoogle} class="w-full mt-8 bg-white text-slate-950 font-bold text-sm py-3 px-4 rounded-xl hover:bg-slate-100 transition-all flex items-center justify-center space-x-2 shadow-lg">
                                <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
                                <span>Sign In with Google</span>
                            </button>
                        </div>
                    </div>
                );
            }

            // Authenticated Main Workspace
            return (
                <div class="min-h-screen">
                    <header class="border-b border-slate-800 bg-slate-900/80 sticky top-0 z-40 backdrop-blur-md px-6 h-16 flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <span class="text-xl">📊</span>
                            <div>
                                <h1 class="text-base font-bold">FolioAI Production</h1>
                                <p class="text-[10px] text-slate-400 font-medium">User: {user.displayName || user.email}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">{cloudStatus}</div>
                            <button onClick={logoutUser} class="text-xs font-semibold text-rose-400 bg-rose-500/10 hover:bg-rose-500/20 px-3 py-1.5 rounded-xl transition-all">Sign Out</button>
                        </div>
                    </header>
                    <main class="max-w-7xl mx-auto p-6">
                        <div class="text-sm text-slate-400 bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
                            <p>🔒 <strong>Secure Google Auth Instance Online.</strong> Your session cache is active. You won't be kicked out to the sign-in prompt when refreshing the page anymore unless you explicitly sign out.</p>
                            <div class="p-3 bg-slate-950/50 border border-slate-800 rounded-xl text-xs text-slate-500">
                                Total Live Logged Positions: <span class="text-indigo-400 font-mono font-bold">{holdings.length} tickers loaded</span>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
