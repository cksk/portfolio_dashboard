            // --- FIREBASE LIVE DATABASE COUPLER ---

                const app = sdk.getApps().length > 0 ? sdk.getApp() : sdk.initializeApp(firebaseConfig);

                        setCloudStatus('connecting');

                        setTransactions(INITIAL_TRANSACTIONS);

                        setUnclaimedDividends([]);
                    }

            const saveToCloud = async (newHoldings, newTransactions, newDividendsCash, newUnclaimed) => {

                const sdk = window.FirebaseSDK;

                setCloudStatus('saving');
                try {
                    const app = sdk.getApps().length > 0 ? sdk.getApp() : sdk.initializeApp(firebaseConfig);
                    const db = sdk.getFirestore(app);
                    const docRef = sdk.doc(db, 'artifacts', 'portfolio-dashboard-main', 'users', user.uid, 'portfolioState', 'data');

                        transactions: newTransactions || [],
                        claimedDividendsCash: Number(newDividendsCash) || 0,
                        unclaimedDividends: newUnclaimed || []
                    });
                    setCloudStatus('synced');
                } catch (err) {
                    console.error("Failed cloud state save: ", err);
                    setCloudStatus('error');
                }

                setModalAlert({ title, message, isConfirm: true, onConfirm });
            };

                if (!id) return '';
                if (id.length <= 12) return id;
                return `${id.substring(0, 6)}...${id.substring(id.length - 4)}`;
            };

            // --- REAL-TIME DATA, FOREX SYNC & DAY'S CHANGE ---
            const syncLiveMarketPrices = async () => {
                setLastPriceSync("Syncing...");
                let updatedHoldings = [...(holdings || [])];
                let discoveredDividends = [...(unclaimedDividends || [])];
                let dividendsUpdated = false;

                try {
                    const fxUrl = `https://query1.finance.yahoo.com/v8/finance/chart/HKD=X?interval=1d&range=1d`;
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(fxUrl)}`;
                    const response = await fetch(proxyUrl);
                    if (response.ok) {
                        const resJson = await response.json();
                        const rate = JSON.parse(resJson.contents)?.chart?.result?.[0]?.meta?.regularMarketPrice;
                        if (rate) {
                            setUsdToHkd(parseFloat(rate.toFixed(4)));
                        }
                    }
                } catch (err) {
                    console.warn("Could not sync live forex rates. Fallback to peg of 7.80.");
                }

                for (let i = 0; i < updatedHoldings.length; i++) {
                    const h = updatedHoldings[i];
                    try {
                        const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${h.symbol}?interval=1d&range=6mo&events=div`;
                        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                        const response = await fetch(proxyUrl);
                        
                        if (response.ok) {
                            const resJson = await response.json();
                            const contents = JSON.parse(resJson.contents);
                            const result = contents?.chart?.result?.[0];
                            if (result) {
                                const price = result.meta?.regularMarketPrice;
                                const previousClose = result.meta?.chartPreviousClose || h.previousClose;
                                
                                if (price) {
                                    updatedHoldings[i] = { 
                                        ...h, 
                                        currentPrice: parseFloat(price.toFixed(2)),
                                        previousClose: previousClose ? parseFloat(previousClose.toFixed(2)) : h.previousClose 
                                    };
                                }

                                const divEvents = result.events?.dividends;
                                if (divEvents && h.shares > 0) {
                                    Object.values(divEvents).forEach(event => {
                                        const exDateStr = new Date(event.date * 1000).toISOString().split('T')[0];
                                        const amountPerShare = Number(event.amount) || 0;
                                        const totalPayout = h.shares * amountPerShare;

                                        if (totalPayout > 0) {
                                            const alreadyUnclaimed = discoveredDividends.some(d => d.symbol === h.symbol && d.date === exDateStr);
                                            const alreadyClaimed = (transactions || []).some(t => t.symbol === h.symbol && t.date === exDateStr && t.type === 'DIVIDEND');

                                            if (!alreadyUnclaimed && !alreadyClaimed) {
                                                discoveredDividends.push({
                                                    id: `div-auto-${h.symbol}-${event.date}`,
                                                    symbol: h.symbol,
                                                    amount: totalPayout,
                                                    perShare: amountPerShare,
                                                    date: exDateStr,
                                                    processed: false,
                                                    currency: h.currency,
                                                    simulatedUpcoming: false
                                                });
                                                dividendsUpdated = true;
                                            }
                                        }
                                    });
                                }
                            }
                        }
                    } catch (err) {
                        console.warn(`Data sync and dividend scan failed for: ${h.symbol}`);
                    }
                }

                setHoldings(updatedHoldings);
                if (dividendsUpdated) {
                    discoveredDividends.sort((a,b) => new Date(b.date) - new Date(a.date));
                    setUnclaimedDividends(discoveredDividends);
                }
                setLastPriceSync(new Date().toLocaleTimeString());
                saveToCloud(updatedHoldings, transactions, claimedDividendsCash, discoveredDividends);
                showNotification("Sync Complete", "Prices, Day's Change, Dynamic FX, and Corporate Ex-Dividend Schedules synchronized!");

            const totals = useMemo(() => {
                let totalValueUSD = 0, totalCostUSD = 0, categoryMap = {}, weightedExpenseRatio = 0, portfolioBeta = 0;

                (holdings || []).forEach(h => {
                    const isHKD = h.currency === 'HKD';

                    totalValueUSD += valueUSD;
                    totalCostUSD += costUSD;

                    if (!categoryMap[h.category]) categoryMap[h.category] = { name: h.category, value: 0, color: h.color };
                    categoryMap[h.category].value += valueUSD;
                });

                const totalGainUSD = totalValueUSD - totalCostUSD;
                const gainPercentage = totalCostUSD > 0 ? (totalGainUSD / totalCostUSD) * 100 : 0;
                const categories = Object.values(categoryMap).map(c => ({ ...c, percentage: totalValueUSD > 0 ? (c.value / totalValueUSD) * 100 : 0 }));

                (holdings || []).forEach(h => {
                    const isHKD = h.currency === 'HKD';
                    const valUSD = (Number(h.shares) || 0) * (isHKD ? (Number(h.currentPrice) || 0) / usdToHkd : (Number(h.currentPrice) || 0));
                    const weight = totalValueUSD > 0 ? (valUSD / totalValueUSD) : 0;
                    weightedExpenseRatio += weight * (Number(h.expenseRatio) || 0);
                    portfolioBeta += weight * (ASSET_METADATA[h.symbol]?.beta || 1.0);
                });

                // ALL-TIME REALIZED PROFIT ENGINE
                let totalSellsCashUSD = 0, totalBuysCashUSD = 0, totalDividendsCashUSD = 0;
                (transactions || []).forEach(tx => {
                    const amt = Number(tx.amount) || 0;
                    const prc = Number(tx.price) || 0;
                    const comm = Number(tx.commission) || 0;
                    const isHKD = tx.currency === 'HKD';
                    
                    let netCash = 0;
                    if (tx.type === 'BUY') netCash = (amt * prc) + comm;
                    else if (tx.type === 'SELL' || tx.type === 'LIQUIDATE') netCash = (amt * prc) - comm;
                    else if (tx.type === 'DIVIDEND') netCash = (amt * prc) - comm; 
                    
                    const netCashUSD = isHKD ? netCash / usdToHkd : netCash;
                    
                    if (tx.type === 'BUY') totalBuysCashUSD += netCashUSD;
                    else if (tx.type === 'SELL' || tx.type === 'LIQUIDATE') totalSellsCashUSD += netCashUSD;
                    else if (tx.type === 'DIVIDEND') totalDividendsCashUSD += netCashUSD;

                if (selectedTxForEdit.type === 'BUY' || selectedTxForEdit.type === 'SELL' || selectedTxForEdit.type === 'LIQUIDATE') {
                    const oldAmt = Number(selectedTxForEdit.amount) || 0;
                    const oldPrc = Number(selectedTxForEdit.price) || 0;
                    const oldDelta = selectedTxForEdit.type === 'BUY' ? oldAmt : -oldAmt;
                    const newDelta = editTxType === 'BUY' ? amountNum : ((editTxType === 'SELL' || editTxType === 'LIQUIDATE') ? -amountNum : 0);

                    nextHoldings = nextHoldings.map(h => {
                        if (h.symbol === oldSymbol) { return { ...h, shares: Math.max(0, (Number(h.shares) || 0) - oldDelta) }; }
                        return h;
                    });
                    nextHoldings = nextHoldings.map(h => {
                        if (h.symbol === newSymbol) { return { ...h, shares: (Number(h.shares) || 0) + newDelta }; }
                        return h;
                    });
                } else if (selectedTxForEdit.type === 'DIVIDEND') {
                    const oldAmt = Number(selectedTxForEdit.amount) || 0;
                    const oldPrc = Number(selectedTxForEdit.price) || 0;
                    const oldComm = Number(selectedTxForEdit.commission) || 0;
                    const oldNet = (oldAmt * oldPrc) - oldComm;
                    const oldNetUSD = selectedTxForEdit.currency === 'HKD' ? oldNet / usdToHkd : oldNet;

                    const newNet = (amountNum * priceNum) - commissionNum;
                    const newNetUSD = editTxCurrency === 'HKD' ? newNet / usdToHkd : newNet;

                    nextCash = Math.max(0, nextCash - oldNetUSD + newNetUSD);
                }

                setHoldings(nextHoldings); setTransactions(nextTransactions); setClaimedDividendsCash(nextCash);
                saveToCloud(nextHoldings, nextTransactions, nextCash, unclaimedDividends);
                setIsEditTxModalOpen(false); setSelectedTxForEdit(null);
                showNotification("Changes Committed", "Respective assets and transaction ledger adjusted successfully.");

            const handleDeleteTx = (id) => {
                const txToDelete = (transactions || []).find(t => t.id === id);
                if (!txToDelete) return;

                showConfirmation("Delete Ledger Item", `Are you sure you want to permanently delete transaction record ${txToDelete.symbol} (${txToDelete.type})?`, () => {
                    const nextTransactions = (transactions || []).filter(t => t.id !== id);
                    let nextHoldings = [...(holdings || [])];
                    let nextCash = Number(claimedDividendsCash) || 0;

                    if (txToDelete.type === 'BUY' || txToDelete.type === 'SELL') {
                        const delAmt = Number(txToDelete.amount) || 0;
                        const delta = txToDelete.type === 'BUY' ? delAmt : -delAmt;
                        nextHoldings = nextHoldings.map(h => {
                            if (h.symbol === txToDelete.symbol) { return { ...h, shares: Math.max(0, (Number(h.shares) || 0) - delta) }; }
                            return h;

                        const amt = Number(txToDelete.amount) || 0;
                        const prc = Number(txToDelete.price) || 0;
                        const comm = Number(txToDelete.commission) || 0;
                        const netValUSD = txToDelete.currency === 'HKD' ? ((amt * prc) - comm) / usdToHkd : ((amt * prc) - comm);
                        nextCash = Math.max(0, nextCash - netValUSD);

                    setHoldings(nextHoldings); setTransactions(nextTransactions); setClaimedDividendsCash(nextCash);
                    saveToCloud(nextHoldings, nextTransactions, nextCash, unclaimedDividends);
                    showNotification("Record Deleted", "Transaction wiped from ledger. Holdings reverted.");

            const callGemini = async (userMessage) => {
                setIsAiLoading(true);

                const formattedHoldings = (holdings || []).map(h => {
                    const isHKD = h.currency === 'HKD';
                    const currentPriceUSD = isHKD ? (Number(h.currentPrice) || 0) / usdToHkd : (Number(h.currentPrice) || 0);
                    const currentPct = totals.totalValueUSD > 0 ? (((Number(h.shares) || 0) * currentPriceUSD) / totals.totalValueUSD) * 100 : 0;
                    return `- ${h.symbol}: Price: ${h.currentPrice} ${h.currency} | Weight: ${currentPct.toFixed(1)}% | Beta: ${(ASSET_METADATA[h.symbol] || {beta: 1.0}).beta}`;
                }).join('\n');

                const fullSystemPrompt = `${SYSTEM_PROMPT}\n\nCURRENT PORTFOLIO MATRIX:\n${formattedHoldings}\nTotal USD Value: $${totals.totalValueUSD.toFixed(2)}\nWeighted Portfolio Beta: ${totals.portfolioBeta.toFixed(3)}\nActive Exchange Rate: 1 USD = ${usdToHkd} HKD`;
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`;

                try {
                    const response = await fetch(url, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: userMessage }] }], systemInstruction: { parts: [{ text: fullSystemPrompt }] } })

                    const data = await response.json();
                    const replyText = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response received. Verify API services.";
                    setMessages(prev => [...prev, { sender: 'assistant', text: replyText }]);

            const handleSendMessage = (e) => {

            const triggerPresetCopilotQuery = (queryType) => {

                else if (queryType === 'dividends') queryText = "Critique my compounding yield. What is the impact of dividend tax drag on my 20-year DRIP projection?";

            const comparisonData = useMemo(() => {
                const pointsCount = timeframe === '1D' ? 12 : timeframe === '1W' ? 7 : timeframe === '1M' ? 15 : 30;
                const seedValue = totals.totalValueUSD;
                const portfolioVol = timeframe === '1D' ? 0.005 : timeframe === '1W' ? 0.015 : timeframe === '1M' ? 0.04 : 0.09;
                const spyVol = portfolioVol * 0.70; 
                const acwiVol = portfolioVol * 0.60; 

                let portCurrent = seedValue * (1 - portfolioVol * 0.5);
                let spyCurrent = seedValue * (1 - spyVol * 0.4);
                let acwiCurrent = seedValue * (1 - acwiVol * 0.3);

                const portfolioPoints = [];
                const spyPoints = [];
                const acwiPoints = [];

                for (let i = 0; i < pointsCount; i++) {
                    const progress = i / (pointsCount - 1);
                    let label = timeframe === '1D' ? `${Math.floor(9 + (i * 8)/pointsCount)}:00` : timeframe === '1W' ? ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'][i % 7] : timeframe === '1M' ? `Day ${i+1}` : `M${Math.floor(i/2.5)+1}`;
                    const portWave = Math.sin(progress * Math.PI * 2) * (seedValue * portfolioVol * 0.3);
                    const portTrend = progress * (seedValue * (totals.gainPercentage > 0 ? 0.06 : -0.02));
                    portfolioPoints.push({ label, value: portCurrent + portWave + portTrend });
                    const spyWave = Math.sin(progress * Math.PI * 1.8) * (seedValue * spyVol * 0.25);
                    const spyTrend = progress * (seedValue * 0.035); 
                    spyPoints.push({ label, value: spyCurrent + spyWave + spyTrend });
                    const acwiWave = Math.sin(progress * Math.PI * 1.5) * (seedValue * acwiVol * 0.2);
                    const acwiTrend = progress * (seedValue * 0.025);
                    acwiPoints.push({ label, value: acwiCurrent + acwiWave + acwiTrend });
                }

                if (portfolioPoints.length > 0) portfolioPoints[portfolioPoints.length - 1].value = totals.totalValueUSD;
                if (spyPoints.length > 0) spyPoints[spyPoints.length - 1].value = totals.totalValueUSD * 0.94; 
                if (acwiPoints.length > 0) acwiPoints[acwiPoints.length - 1].value = totals.totalValueUSD * 0.91; 
                return { portfolioPoints, spyPoints, acwiPoints };

            const [hoveredPoint, setHoveredPoint] = useState(null);

                return activeValList.length === 0 ? { min: 0, max: 1 } : { min: Math.min(...activeValList) * 0.99, max: Math.max(...activeValList) * 1.01 };

                    const x = chartPadding + (i / (series.length - 1)) * (chartWidth - chartPadding * 2);
                    const y = chartHeight - chartPadding - ((point.value - scaleBounds.min) / range) * (chartHeight - chartPadding * 2);
                    return { x, y, value: point.value, label: point.label };

                return { portfolio: getCoords(comparisonData.portfolioPoints), spy: getCoords(comparisonData.spyPoints), acwi: getCoords(comparisonData.acwiPoints) };

                if (coords.length === 0) return '';

                if (coords.length === 0) return '';

                                                        <span className="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                                                        <span className="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></span>
                                                        <span className="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></span>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <form onSubmit={handleSendMessage} className="flex items-center space-x-2 border-t border-slate-800/80 pt-4">
                                        <input 
                                            type="text" 
                                            placeholder="Connect your Gemini API Key in the config script to chat!"
                                            value={copilotInput}
                                            onChange={(e) => setCopilotInput(e.target.value)}
                                            disabled={isAiLoading}
                                            className="flex-1 px-4 py-2.5 rounded-xl text-xs sm:text-sm bg-slate-900 border border-slate-750 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                        />
                                        <button type="submit" disabled={isAiLoading} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs sm:text-sm px-4 py-2.5 rounded-xl">Inquire</button>
                                    </form>
                                </div>
                            </div>
                        )}

                    </div>

                    {/* --- SECURE OVERLAY MODAL SYSTEM --- */}
                    {modalAlert && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[99] animate-slide-in">
                            <div className={`w-full max-w-md p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-800'} shadow-2xl`}>
                                <h3 className="font-extrabold text-lg mb-2">{modalAlert.title}</h3>
                                <p className="text-xs opacity-75 mb-6 leading-relaxed">{modalAlert.message}</p>
                                <div className="flex justify-end space-x-2">
                                    {modalAlert.isConfirm && (
                                        <button 
                                            onClick={() => setModalAlert(null)}
                                            className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-xs font-bold transition-all"
                                        >
                                            Cancel
                                        </button>
                                    )}
                                    <button 
                                        onClick={() => {
                                            if (modalAlert.onConfirm) modalAlert.onConfirm();
                                            setModalAlert(null);
                                        }}
                                        className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold transition-all"
                                    >
                                        {modalAlert.isConfirm ? 'Confirm Action' : 'OK'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: TRANSACTION MODIFIER EDIT INTERFACE */}
                    {isEditTxModalOpen && selectedTxForEdit && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-slide-in">
                            <div className={`w-full max-w-md p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-800'} shadow-2xl`}>
                                <div className="flex items-center justify-between mb-4">
                                  <h3 className="font-extrabold text-lg">Modify Transaction Log</h3>
                                  <button onClick={() => { setIsEditTxModalOpen(false); setSelectedTxForEdit(null); }} className="opacity-60 hover:opacity-100">✕</button>
                                </div>

                                <form onSubmit={handleEditTxSubmit} className="space-y-4">
                                  <div>
                                    <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Asset Code</label>
                                    <select 
                                      value={editTxSymbol} 
                                      onChange={e => setEditTxSymbol(e.target.value)} 
                                      className="w-full px-3 py-2 rounded-xl text-sm border border-slate-750 bg-slate-900 text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                      required
                                    >
                                      {(holdings || []).map(h => (
                                        <option key={h.id} value={h.symbol} className="bg-slate-900 text-slate-100">{h.symbol}</option>
                                      ))}
                                    </select>
                                  </div>

                                  <div className="grid grid-cols-2 gap-2">
                                    <div>
                                      <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Transaction Type</label>
                                      <select 
                                        value={editTxType} 
                                        onChange={e => setEditTxType(e.target.value)} 
                                        className="w-full px-3 py-2 rounded-xl text-sm border border-slate-750 bg-slate-900 text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                        required
                                      >
                                        <option value="BUY" className="bg-slate-900 text-slate-100">BUY</option>
                                        <option value="SELL" className="bg-slate-900 text-slate-100">SELL</option>
                                        <option value="DIVIDEND" className="bg-slate-900 text-slate-100">DIVIDEND</option>
                                        <option value="LIQUIDATE" className="bg-slate-900 text-slate-100">LIQUIDATE</option>
                                      </select>
                                    </div>
                                    <div>
                                      <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Trading Currency</label>
                                      <select 
                                        value={editTxCurrency} 
                                        onChange={e => setEditTxCurrency(e.target.value)} 
                                        className="w-full px-3 py-2 rounded-xl text-sm border border-slate-750 bg-slate-900 text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                        required
                                      >
                                        <option value="USD" className="bg-slate-900 text-slate-100">USD ($)</option>
                                        <option value="HKD" className="bg-slate-900 text-slate-100">HKD (HK$)</option>
                                      </select>
                                    </div>
                                  </div>

                                  <div className="grid grid-cols-3 gap-2">
                                    <div>
                                      <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Shares Count</label>
                                      <input 
                                        type="number" step="any"
                                        value={editTxAmount} 
                                        onChange={e => setEditTxAmount(e.target.value)} 
                                        className="w-full px-3 py-2 rounded-xl text-sm border border-slate-750 bg-slate-900 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" 
                                        required 
                                      />
                                    </div>
                                    <div>
                                      <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Price</label>
                                      <input 
                                        type="number" step="any"
                                        value={editTxPrice} 
                                        onChange={e => setEditTxPrice(e.target.value)} 
                                        className="w-full px-3 py-2 rounded-xl text-sm border border-slate-750 bg-slate-900 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" 
                                        required 
                                      />
                                    </div>
                                    <div>
                                      <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Commission</label>
                                      <input 
                                        type="number" step="any"
                                        value={editTxCommission} 
                                        onChange={e => setEditTxCommission(e.target.value)} 
                                        className="w-full px-3 py-2 rounded-xl text-sm border border-slate-750 bg-slate-900 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" 
                                        required 
                                      />
                                    </div>
                                  </div>

                                  <div>
                                    <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Execution Date</label>
                                    <input 
                                      type="date" 
                                      value={editTxDate} 
                                      onChange={e => setEditTxDate(e.target.value)} 
                                      className="w-full px-3 py-2 rounded-xl text-sm border border-slate-750 bg-slate-900 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" 
                                      required 
                                    />
                                  </div>

                                  <div className="border-t border-slate-800/80 pt-3 flex items-center justify-between text-xs font-semibold">
                                    <span className="opacity-75">Adjusted Total Value:</span>
                                    <span className="font-black text-indigo-400">
                                      {editTxCurrency === 'USD' ? '$' : 'HK$'}{((parseFloat(editTxAmount) || 0) * (parseFloat(editTxPrice) || 0)).toLocaleString(undefined, { minimumFractionDigits: 2 })}
                                    </span>
                                  </div>

                                  <div className="grid grid-cols-2 gap-2 pt-2">
                                    <button 
                                      type="button" 
                                      onClick={() => { setIsEditTxModalOpen(false); setSelectedTxForEdit(null); }}
                                      className="py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl text-xs transition-all"
                                    >
                                      Cancel
                                    </button>
                                    <button 
                                      type="submit" 
                                      className="py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-xs transition-all"
                                    >
                                      Save Changes
                                    </button>
                                  </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Dividend Collection Commission Modal Dialog */}
                    {isClaimDivModalOpen && selectedDivToClaim && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-slide-in">
                            <div className="w-full max-w-md p-6 rounded-2xl border border-slate-800 bg-slate-900 text-white shadow-2xl">
                                <h3 className="font-bold text-base mb-1">Reinvest Dividend</h3>
                                <p className="text-xs opacity-50 mb-4">Set brokerage fee or tax collection deduction details on gross payouts</p>
                                
                                <form onSubmit={executeClaimDividend} className="space-y-4">
                                    <div className="p-4 rounded-xl bg-slate-800/40 border border-slate-800 flex items-center justify-between text-xs">
                                        <div>
                                            <span className="font-bold opacity-60 block">Declared Holding</span>
                                            <span className="font-black text-sm text-indigo-400">{selectedDivToClaim.symbol}</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="font-bold opacity-60 block">Gross Distribution</span>
                                            <span className="font-black text-sm text-emerald-400">
                                                {selectedDivToClaim.currency === 'USD' ? '$' : 'HK$'}{(Number(selectedDivToClaim.amount) || 0).toFixed(2)}
                                            </span>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Commission Deduction Type</label>
                                        <div className="grid grid-cols-2 gap-2 mb-3">
                                            <button 
                                                type="button"
                                                onClick={() => {
                                                    setDivCommissionType('FLAT');
                                                    setDivCommissionVal(selectedDivToClaim.currency === 'HKD' ? '15.00' : '1.99');
                                                }}
                                                className={`py-1.5 rounded-lg text-xs font-bold transition-all border ${divCommissionType === 'FLAT' ? 'bg-indigo-950/40 text-indigo-400 border-indigo-500' : 'border-slate-800 opacity-60'}`}
                                            >
                                                💵 Flat Broker Fee
                                            </button>
                                            <button 
                                                type="button"
                                                onClick={() => {
                                                    setDivCommissionType('PERCENT');
                                                    setDivCommissionVal('30');
                                                }}
                                                className={`py-1.5 rounded-lg text-xs font-bold transition-all border ${divCommissionType === 'PERCENT' ? 'bg-indigo-950/40 text-indigo-400 border-indigo-500' : 'border-slate-800 opacity-60'}`}
                                            >
                                                ٪ Percentage / Tax
                                            </button>
                                        </div>

                                        <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">
                                            {divCommissionType === 'FLAT' ? 'Flat Commission Amount' : 'Withholding Tax / Fee Percentage'}
                                        </label>
                                        <div className="grid grid-cols-3 gap-2">
                                            <div className="col-span-2">
                                                <input 
                                                    type="number" step="any"
                                                    value={divCommissionVal} 
                                                    onChange={(e) => setDivCommissionVal(e.target.value)}
                                                    className="w-full p-2 bg-slate-900 rounded border border-slate-700 text-sm text-white focus:outline-none focus:ring-1 focus:ring-indigo-550" 
                                                    required 
                                                />
                                            </div>
                                            <div className="bg-slate-800 flex items-center justify-center rounded border border-slate-700 font-bold text-xs text-slate-300">
                                                {divCommissionType === 'FLAT' ? selectedDivToClaim.currency : '%'}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-2 flex justify-between items-center text-xs border-t border-slate-800">
                                        <span className="opacity-60">Estimated Net payout credit:</span>
                                        <span className="font-black text-emerald-400">
                                            {selectedDivToClaim.currency === 'USD' ? '$' : 'HK$'}
                                            {((Number(selectedDivToClaim.amount) || 0) - (divCommissionType === 'FLAT' ? (parseFloat(divCommissionVal) || 0) : ((Number(selectedDivToClaim.amount) || 0) * (parseFloat(divCommissionVal) || 0) / 100))).toFixed(2)}
                                        </span>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2 pt-2">
                                        <button 
                                            type="button" 
                                            onClick={() => {
                                                setIsClaimDivModalOpen(false);
                                                setSelectedDivToClaim(null);
                                            }}
                                            className="py-2 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl text-xs"
                                        >
                                            Cancel
                                        </button>
                                        <button 
                                            type="submit" 
                                            className="py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl text-xs"
                                        >
                                            Confirm Reinvestment
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Trade Trigger Dialog Modal */}
                    {isBuySellModalOpen && selectedAssetForModal && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-slide-in">
                            <div className={`w-full max-w-md p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-800'} shadow-2xl`}>
                                <h3 className="font-bold text-lg mb-4">Trade Position Sim - {selectedAssetForModal.symbol}</h3>
                                <form onSubmit={handleBuySellSubmit} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <button type="button" onClick={() => setTradeType('BUY')} className={`py-1.5 rounded-xl text-xs font-bold ${tradeType==='BUY'?'bg-emerald-500/20 text-emerald-400 border border-emerald-500':'border border-slate-800'}`}>BUY</button>
                                        <button type="button" onClick={() => setTradeType('SELL')} className={`py-1.5 rounded-xl text-xs font-bold ${tradeType==='SELL'?'bg-rose-500/20 text-rose-400 border-rose-500':'border border-slate-800'}`}>SELL</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" step="any" placeholder="Shares" value={tradeAmount} onChange={(e) => setTradeAmount(e.target.value)} className="p-2 border border-slate-750 bg-slate-900 text-slate-100 rounded text-sm outline-none" required />
                                        <input type="number" step="any" placeholder="Price" value={tradePrice} onChange={(e) => setTradePrice(e.target.value)} className="p-2 border border-slate-750 bg-slate-900 text-slate-100 rounded text-sm outline-none" required />
                                    </div>
                                    <button type="submit" className="w-full py-2 bg-indigo-600 rounded-xl text-sm font-bold">Process Simulation Trade</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add Asset Modal */}
                    {isAddModalOpen && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-slide-in">
                            <div className="w-full max-w-md p-6 rounded-2xl border border-slate-800 bg-slate-900 text-white shadow-2xl">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="font-extrabold text-lg">Add Custom Holding</h3>
                                    <button onClick={() => setIsAddModalOpen(false)} className="text-sm hover:text-white opacity-50">✕</button>
                                </div>
                                <form onSubmit={handleAddAsset} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Asset Symbol</label>
                                            <input type="text" placeholder="e.g. VTI" value={newSymbol} onChange={(e) => setNewSymbol(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Trading Currency</label>
                                            <select value={newCurrency} onChange={(e) => setNewCurrency(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none">
                                                <option value="USD" className="bg-slate-900 text-slate-100">USD ($)</option>
                                                <option value="HKD" className="bg-slate-900 text-slate-100">HKD (HK$)</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Asset Name</label>
                                        <input type="text" placeholder="e.g. Vanguard Total Stock" value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Qty</label>
                                            <input type="number" step="any" placeholder="10" value={newShares} onChange={(e) => setNewShares(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Price</label>
                                            <input type="number" step="any" placeholder="100" value={newPrice} onChange={(e) => setNewPrice(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold opacity-60 block mb-1">Expense %</label>
                                            <input type="number" step="any" placeholder="0.10" value={newExpenseRatio} onChange={(e) => setNewExpenseRatio(e.target.value)} className="w-full p-2.5 border border-slate-700 bg-slate-900 text-slate-100 rounded-xl text-sm outline-none" required />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-bold">Add Position</button>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
